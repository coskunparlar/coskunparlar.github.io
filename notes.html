<style>
  :root{
    --ink:        #0a0c10;
    --panel:      #11151c;
    --panel-2:    #161b24;
    --border:     #232a35;
    --border-2:   #2c3441;
    --text:       #e9e6dd;
    --text-dim:   #a7aeb9;
    --text-mute:  #79828f;
    --amber:      #f0a940;
    --amber-dim:  #c98a34;
    --font-display:'Inter',Arial,Helvetica,sans-serif;
    --font-body:'Inter',Arial,Helvetica,sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --container: 840px;
    --ease: cubic-bezier(.22,.7,.2,1);
  }
  body.light-mode{
    --ink:        #f6f4ee;
    --panel:      #ffffff;
    --panel-2:    #f0ede5;
    --border:     #ddd8cb;
    --border-2:   #c9c3b3;
    --text:       #16181c;
    --text-dim:   #4c5259;
    --text-mute:  #676d74;
    --amber:      #b3690f;
    --amber-dim:  #8f5309;
  }

  /* ---- tone accents (match topology l1..l5 + risk) ---- */
  .tone-1{--accent:#f0a940}
  .tone-2{--accent:#c98bff}
  .tone-3{--accent:#4da3ff}
  .tone-4{--accent:#2fd4c4}
  .tone-5{--accent:#4bd07f}
  .tone-6{--accent:#ff9166}
  body.light-mode .tone-1{--accent:#b97a13}
  body.light-mode .tone-2{--accent:#7d3fc4}
  body.light-mode .tone-3{--accent:#1d6fd1}
  body.light-mode .tone-4{--accent:#0f8a80}
  body.light-mode .tone-5{--accent:#178a4e}
  body.light-mode .tone-6{--accent:#c2410c}

  *,*::before,*::after{box-sizing:border-box}
  @media (prefers-reduced-motion:reduce){ *,*::before,*::after{animation-duration:.001ms !important;transition-duration:.001ms !important} }
  html{scroll-behavior:smooth}
  html,body{margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;transition:background .35s var(--ease),color .35s var(--ease)}
  a{color:inherit;text-decoration:none}
  ul{margin:0;padding:0;list-style:none}
  h1,h2{font-family:var(--font-display);margin:0;letter-spacing:-.01em}
  p{margin:0}
  .wrap{max-width:var(--container);margin:0 auto;padding:0 28px}
  ::selection{background:var(--amber);color:var(--ink)}
  :focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:2px}

  /* scroll progress */
  .progress{position:fixed;top:0;left:0;height:2px;width:0;background:linear-gradient(90deg,var(--amber),var(--amber-dim));z-index:200;transition:width .12s linear}

  .corner-controls{
    position:fixed;top:18px;right:18px;z-index:100;display:flex;gap:6px;
    background:color-mix(in srgb, var(--ink) 70%, transparent);backdrop-filter:blur(8px);
    border:1px solid var(--border);border-radius:999px;padding:5px;
  }
  .ctrl-btn{
    background:transparent;border:none;color:var(--text-dim);font-family:var(--font-mono);font-size:.7rem;
    width:34px;height:34px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
    transition:color .2s var(--ease),background .2s var(--ease);
  }
  .ctrl-btn:hover{color:var(--amber);background:var(--border)}
  .ctrl-btn svg{width:15px;height:15px}

  header.top{padding:90px 0 40px}
  .back-link{
    display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:.78rem;
    color:var(--text-mute);margin-bottom:28px;transition:color .2s var(--ease);
  }
  .back-link:hover{color:var(--amber)}
  .kicker{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:16px}
  .kicker::after{content:'';height:1px;width:52px;background:var(--amber-dim);opacity:.5}
  h1.title{font-size:clamp(2rem,4.4vw,2.8rem);font-weight:700;line-height:1.1;margin-bottom:18px}
  .lede{font-size:1.05rem;line-height:1.75;color:var(--text-dim);max-width:66ch}

  /* hero meta row */
  .hero-meta{display:flex;flex-wrap:wrap;align-items:center;gap:12px 16px;margin-top:26px}
  .hero-count{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute);white-space:nowrap}
  .hero-sep{width:1px;height:14px;background:var(--border-2)}
  .legend{display:flex;flex-wrap:wrap;gap:8px}
  .legend-item{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:.66rem;color:var(--text-dim);background:transparent;border:1px solid var(--border);border-radius:999px;padding:5px 11px;cursor:pointer;transition:border-color .2s var(--ease),color .2s var(--ease),background .2s var(--ease)}
  .legend-item:hover,.legend-item:focus-visible{border-color:var(--accent);color:var(--text);background:color-mix(in srgb,var(--accent) 9%,transparent)}
  .legend-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex:none}

  main{padding-bottom:90px}

  /* ---------- timeline ---------- */
  .timeline{position:relative;margin-top:10px}
  .phase{scroll-margin-top:22px}
  .phase-label{display:flex;align-items:center;gap:12px;margin:42px 0 20px;font-family:var(--font-mono);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
  .phase:first-child .phase-label{margin-top:6px}
  .phase-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 16%,transparent);flex:none}
  .phase-name{white-space:nowrap}
  .phase-line{flex:1;height:1px;min-width:20px;background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 55%,transparent),transparent)}
  .phase-range{font-family:var(--font-mono);font-size:.64rem;letter-spacing:.06em;color:var(--text-mute);flex:none}

  .step{position:relative;display:grid;grid-template-columns:44px 1fr;column-gap:20px;padding:0 0 24px}
  .step-rail{position:relative;display:flex;justify-content:center}
  .step-rail::before{content:'';position:absolute;top:46px;bottom:-24px;left:50%;transform:translateX(-50%);width:1.5px;background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 38%,var(--border-2)),var(--border-2))}
  .phase .step:last-child .step-rail::before{display:none}
  .node-ico{position:relative;z-index:1;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 34%,transparent);background:color-mix(in srgb,var(--accent) 9%,transparent);transition:transform .2s var(--ease),background .2s var(--ease),box-shadow .2s var(--ease)}
  .node-ico svg{width:21px;height:21px}
  .step:hover .node-ico{transform:scale(1.05);background:color-mix(in srgb,var(--accent) 16%,transparent);box-shadow:0 0 0 4px color-mix(in srgb,var(--accent) 10%,transparent)}

  .step-card{position:relative;border:1px solid var(--border);border-radius:14px;background:color-mix(in srgb,var(--panel) 55%,transparent);padding:15px 20px 17px;overflow:hidden;transition:border-color .25s var(--ease),transform .25s var(--ease),background .25s var(--ease)}
  .step-card::before{content:'';position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(180deg,var(--accent),transparent 82%);opacity:.9}
  .step:hover .step-card{border-color:color-mix(in srgb,var(--accent) 45%,var(--border));transform:translateY(-2px);background:color-mix(in srgb,var(--panel) 78%,transparent)}
  .step-top{display:flex;align-items:center;gap:11px;margin-bottom:10px;flex-wrap:wrap}
  .step-idx{font-family:var(--font-mono);font-size:.64rem;font-weight:600;color:var(--accent);letter-spacing:.05em;padding:2px 8px;border:1px solid color-mix(in srgb,var(--accent) 38%,transparent);border-radius:6px;background:color-mix(in srgb,var(--accent) 8%,transparent);white-space:nowrap}
  .step-title{font-family:var(--font-display);font-size:1.06rem;font-weight:600;letter-spacing:-.01em;line-height:1.35;color:var(--text)}
  .step-text{color:var(--text-dim);font-size:.96rem;line-height:1.8}
  .step-text + .step-text{margin-top:12px}

  /* key values strip */
  .specs{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:15px;padding-top:14px;border-top:1px dashed var(--border)}
  .spec{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);line-height:1.4}
  .spec::before{content:'';width:5px;height:5px;border-radius:1.5px;background:var(--accent);opacity:.7;flex:none}
  .spec-k{color:var(--text-mute);font-size:.58rem;letter-spacing:.09em;text-transform:uppercase}
  .spec-v{color:var(--text);font-size:.69rem;font-weight:500}

  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
  .chip{font-family:var(--font-mono);font-size:.64rem;letter-spacing:.02em;color:var(--text-mute);border:1px solid var(--border-2);border-radius:999px;padding:4px 10px;background:color-mix(in srgb,var(--panel-2) 55%,transparent);transition:color .2s var(--ease),border-color .2s var(--ease)}
  .step:hover .chip{color:var(--text-dim)}
  .chip:hover{color:var(--accent);border-color:color-mix(in srgb,var(--accent) 50%,transparent)}

  /* ---------- closing ---------- */
  .closing{position:relative;margin-top:20px;border:1px solid color-mix(in srgb,var(--amber) 32%,var(--border));border-radius:16px;
    background:
      radial-gradient(130% 120% at 0% 0%, color-mix(in srgb,var(--amber) 11%,transparent), transparent 58%),
      color-mix(in srgb,var(--panel) 62%,transparent);
    padding:26px 28px 28px;overflow:hidden}
  .closing::before{content:'';position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(180deg,var(--amber),transparent 82%)}
  .closing-top{display:flex;align-items:center;gap:13px;margin-bottom:13px}
  .closing-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--amber);border:1px solid color-mix(in srgb,var(--amber) 42%,transparent);background:color-mix(in srgb,var(--amber) 12%,transparent);flex:none}
  .closing-ico svg{width:23px;height:23px}
  .closing-label{font-family:var(--font-mono);font-size:.66rem;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);display:block;margin-bottom:3px}
  .closing-title{font-family:var(--font-display);font-size:1.22rem;font-weight:700;letter-spacing:-.01em;line-height:1.25}
  .closing-text{color:var(--text-dim);font-size:1.02rem;line-height:1.85}
  .closing .chips{margin-top:17px}

  footer{padding:34px 0 54px;border-top:1px solid var(--border)}
  .footer-line{font-family:var(--font-mono);font-size:.72rem;color:var(--text-mute)}

  @media print{
    .corner-controls,.back-link,.progress,.legend{display:none !important}
    body.dark-mode,body.light-mode{--ink:#fff;--panel:#fff;--panel-2:#fff;--text:#000;--text-dim:#333;--text-mute:#555;--border:#bbb;--border-2:#999;--amber:#8a5500;--amber-dim:#8a5500}
    body{background:#fff !important;color:#000 !important}
    .step{break-inside:avoid}
    .step-rail::before{background:#999}
  }

  @media (max-width:640px){
    .wrap{padding:0 20px}
    header.top{padding:76px 0 30px}
    .step{grid-template-columns:38px 1fr;column-gap:14px;padding-bottom:22px}
    .node-ico{width:38px;height:38px;border-radius:10px}
    .node-ico svg{width:18px;height:18px}
    .step-rail::before{top:40px}
    .step-card{padding:14px 15px 15px}
    .closing{padding:20px 18px 22px}
  }
</style>
</head>

<script>
/* Tema, ilk boyamadan önce uygulanır (açılış flaşını önler; kayıt yoksa sistem tercihi kullanılır). */
(function(){
  var t = null;
  try { t = localStorage.getItem('theme'); } catch (e) {}
  if (t !== 'light-mode' && t !== 'dark-mode') {
    t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light-mode' : 'dark-mode';
  }
  document.body.className = t;
})();
</script>

            "paragraphs": ["Fiziksel host tasarımı; CPU ve RAM'in yanında NIC ve HBA sayısı, PSU/fan yedekliliği, firmware-driver uyumu ve iLO/iDRAC üzerinden out-of-band yönetimi kapsar. Trading yükü latency-hassas olduğu için BIOS güç profilini High Performance'a sabitler, C-state/P-state ve Energy-Efficient Turbo'yu kapatır, Node Interleaving'i devre dışı bırakırım; böylece çekirdek frekansı dalgalanmaz ve jitter düşer. Kapasite, bir host kaybı veya bakım senaryosunda servisleri komşu node'a taşıyacak N+1 rezervi hedefler; NUMA sınırları baştan planlanır ki kritik VM'ler tek düğümde kalsın."],

            "paragraphs": ["ESXi'de management, vMotion, storage ve production trafiğini ayrı VLAN/port group'a bölerim; NIC teaming, MTU ve multipath'te varsayılana güvenmem, PSP/SATP'yi storage vendor önerisine göre doğrularım. Trading VM'lerinde kararlı performans için CPU/RAM reservation ve NUMA yerleşimine dikkat eder, güç profilini performans tarafında tutarım. Yanlış path policy ya da hatalı ağ ayrımı, storage tarafındaki kısa bir problemi VM outage seviyesine taşıyabilir; bu yüzden yol ve kaynak dengesi sürekli izlenir."],

            "paragraphs": ["MT5 dağıtık ve şifreli bir mimaridir; ölçek sunucu ekleyerek büyür. Trade Server emir/hesap/risk çekirdeğidir — borsa enstrümanlarında netting, Forex'te hedging modeli; History Server tik/bar geçmişini ve (reverse) split'i yönetir; Backup ile veritabanı şifrelemesi veri sürekliliğini sağlar. Access Server istemci bağlantılarını karşılayan proxy ve platform firewall'ıdır: yetkilendirme isteklerini paketleyip Trade Server'a taşır, antiflood ile aşırı yük/saldırıyı süzer, history/DOM/haber verisini cache'leyip History Server yükünü azaltır. En kritik faydası ana sunucu IP'lerini dış dünyadan gizlemesidir — DDoS'ta yalnızca Access IP'leri hedef olur, çekirdek erişilemez kalır; birden çok Access Server coğrafi dağıtılıp gecikme, yük ve önceliğe göre otomatik seçilir."],

          { "icon": "api", "title": "Yönetim, API ve Gateway Katmanı",
            "paragraphs": ["MT5'in kontrol düzlemi rol-bazlı Manager/Admin yetkileriyle yönetilir — muhasebe, dealer, risk yöneticisi ve yönetici rolleri ayrı yetki setleriyle tanımlanır. Platform beş API ile genişler: Report API (raporlama), Server API (Trade/History fonksiyonları), Gateway API (dış sistem/LP entegrasyonu), Manager API (özel yönetim araçları) ve Web API (web entegrasyonu). Gateway'ler borsa ve likidite sağlayıcılara köprüdür ve müşteri riskinin anlık STP ile hedge edilmesini sağlar; her eklenti/gateway'in versiyon uyumu ayrı doğrulanır, çünkü çekirdekle uyumsuz bir plugin canlıda emir akışını durdurabilir."],

          { "icon": "bridge", "title": "Bridge & FxCubic: LP Bağlantısı, Aggregation ve Routing",
            "paragraphs": ["Bridge, trading platformu ile likidite sağlayıcıları arasındaki köprüdür (FxCubic gibi); MT4/MT5 veya cTrader'ı kendi FIX API'si üzerinden LP'lere bağlar. Aggregation'da birden çok LP'nin derinliği birleştirilerek en iyi bid/ask ve VWAP oluşur; priority/fallback'te birincil LP sorun yaşarsa akış sıradaki LP'ye kayar. Fiyat filtreleri bayat ve spike quote'ları eler, markup (ör. FxCubic'in gerçek-zamanlı markup API'si) hesap/grup/sembol bazında uygulanır. Fill rate, rejection rate, latency, slippage ve last-look davranışı günlük operasyonun ölçülen metrikleridir."],

            "paragraphs": ["LP bağlantıları FIX protokolü üzerinden kurulur ve iki katman ayrı düşünülür. Oturum katmanı bağlantının sağlığıdır: Logon/Logout, Heartbeat ve TestRequest ile canlılık; sıra numaraları (MsgSeqNum) ve gap-fill ile kayıp mesaj tespiti ve telafisi. Uygulama katmanı işin kendisidir: fiyat için MarketDataRequest/Snapshot, emir için NewOrderSingle → ExecutionReport akışı; fiyat (quote) ve emir (trade) genelde ayrı oturumlarda taşınır. Oturum kopması, yanlış sıra numarası ya da tıkanan resend kuyruğu doğrudan fiyatsızlık veya askıda emir demektir; bu yüzden her oturumun durumu ve gecikmesi ayrı izlenir."],

            "paragraphs": ["Emir yönlendirme hem icra hem de risk-iştahı kararıdır. A-book (STP) emri LP'ye taşır — kurum spread/komisyon kazanır, piyasa riskini taşımaz; B-book emri kurum içinde karşılar — müşteri PnL'i kurumun karşı pozisyonudur ve sermaye ile risk yönetimi gerektirir. Hybrid, hesap/grup/sembol/hacim ve müşteri kârlılığı gibi kurallarla akışı ikisi arasında paylaştırır (ör. tutarlı kazanan akışı A-book'a yönlendirmek). Doğru kurgu net risk maruziyeti, hedge maliyeti, LP fill kalitesi ve regülasyon/çıkar-çatışması sınırlarını birlikte gözetir ve sürekli ölçülür."],

            "paragraphs": ["MT5'te müşteri deneyimi ve kurum gelir modeli büyük ölçüde grup ayarlarıyla belirlenir. Spread markup, lot başı komisyon, min/max lot, lot step, execution, swap ve sembol izinleri grup bazında net tanımlanır; markup'ın bridge'de mi yoksa grup spread'inde mi uygulanacağı bilinçli seçilir ki çifte markup olmasın. VIP, standart, demo ve kurumsal gruplar aynı kural setiyle çalışmaz — her grubun ticari modeli, risk profili, swap-free ihtiyacı ve raporlaması ayrı kurgulanır."],

            "paragraphs": ["Canlı MT5'te küçük görünen bir sembol/grup/komisyon/kaldıraç/session değişikliği müşteri işlemini ve regülasyon uyumunu doğrudan etkiler; bu yüzden her değişiklik test ortamında doğrulanır, mevcut/yeni değer kayıt altına alınır (maker-checker) ve rollback hazır tutulur. Bağlayıcı düzenleyici SPK'dır (meslek birliği olarak TSPB): SPK, Türkiye'de bireysel kaldıracı 10:1 ile sınırlar (2017) ve teminat, işlem koşulları, müşteri varlıklarının ayrıştırılması ile raporlama kurallarını belirler; sembol, grup, komisyon ve kaldıraç parametreleri bu çerçeveye göre tanımlanır. SPK/TSPB kapsamında raporlama, yetki ve audit kayıtları izlenebilir olduğunda operasyon hem denetime hem de olay analizine hazırdır."],

      "pageTitle": "End-to-End Trading Infrastructure Setup Notes",
      "pageLede": "Field notes for building and validating a trading platform from bare-metal host to LP connectivity. Each note captures one decision — with concrete parameters, thresholds and checks — across infrastructure, network, platform, liquidity, product and risk, grounded in VMware, MetaTrader 5 and FIX practice, and SPK/TSPB regulation.",
      "metaCount": "6 PHASES · 18 NOTES",
      "phases": [
        { "id": "infra", "tone": "tone-1", "name": "INFRASTRUCTURE", "notes": [
          { "icon": "host", "title": "Host Server Design: Hardware, Redundancy and Power Profile",
            "paragraphs": ["Physical host design covers, alongside CPU and RAM, NIC and HBA count, PSU/fan redundancy, firmware-driver alignment and out-of-band management via iLO/iDRAC. Because the trading load is latency-sensitive, I pin the BIOS power profile to High Performance, disable C-/P-states and Energy-Efficient Turbo and turn off Node Interleaving so core frequency stays flat and jitter drops. Capacity targets N+1 headroom — enough to move services to a neighbouring node on host loss or maintenance — and NUMA boundaries are planned up front so critical VMs stay inside a single node."],
            "specs": [["BIOS","High Performance"],["C-/P-state","off"],["Headroom","N+1"],["Mgmt","iLO/iDRAC"]],
            "tags": ["N+1","iLO/iDRAC","HBA","C-states off","NUMA"] },
          { "icon": "storage", "title": "Storage Design: Performance, Protection and Rebuild Risk",
            "paragraphs": ["RAID level, disk type, datastore separation and latency thresholds set stability directly. Because rebuild windows grow on large disks, I use RAID 6 over RAID 5 for critical workloads and RAID 10 for high-IOPS Trade/DB roles, and I split log, database and backup traffic across separate datastores so none starves another. Beyond preventing data loss, the goal is to keep trading-VM disk latency under threshold (typically single-digit milliseconds) during rebuild, snapshot and backup, while watching queue depth and multipath balance."],
            "specs": [["Critical","RAID 6"],["High IOPS","RAID 10"],["Latency","<~10 ms"],["Split","log/DB/backup"]],
            "tags": ["RAID 6","RAID 10","IOPS","datastore split","multipath"] },
          { "icon": "esxi", "title": "ESXi Setup: Network Separation, Multipathing and Resource Management",
            "paragraphs": ["In ESXi I separate management, vMotion, storage and production onto their own VLANs/port groups, and never trust defaults for NIC teaming, MTU or multipathing — PSP/SATP is validated against the storage vendor. For trading VMs I use CPU/RAM reservations and careful NUMA placement for stable performance and keep the power profile on the performance side. A wrong path policy or weak network separation can turn a short storage issue into a VM-level outage, so path and resource balance are monitored continuously."],
            "specs": [["Network","separate VLAN/port group"],["Storage","multipath · PSP/SATP"],["Resources","CPU/RAM reservation"],["Placement","NUMA"]],
            "tags": ["VLAN/port group","NIC teaming","multipath","PSP/SATP","CPU/RAM reservation","NUMA"] },
          { "icon": "cluster", "title": "vCenter & HA/DRS: Capacity, Placement and Failover Control",
            "paragraphs": ["HA, DRS, admission control and anti-affinity are designed together. Redundant Trade nodes are kept off the same physical host by anti-affinity, and admission control guarantees enough spare capacity to restart VMs after a host loss — consistent with the N+1 headroom at the host layer. To avoid breaking CPU affinity on latency-sensitive VMs I keep DRS manual/partially-automated for them or use a dedicated cluster; HA continues the service after a host loss with the right placement, network reachability and capacity."],
            "specs": [["HA","admission control"],["Redundant","anti-affinity"],["Latency VM","manual DRS"]],
            "tags": ["HA","DRS","admission control","anti-affinity"] },
          { "icon": "vm", "title": "VM Provisioning: Role-Based and Standardized",
            "paragraphs": ["Every VM has a clear role from the start: Trade, History, Access, Backup/DR, bridge, monitoring, integration. Disk layout, VLAN, DNS, NTP, hostname, IP plan, OS hardening and service accounts are standardized from a golden template, so troubleshooting and new builds are fast and configuration drift is prevented. Without an inventory and dependency map, finding which service runs where and on what it depends becomes an operational risk in production."],
            "specs": [["Template","golden image"],["Time","NTP"],["Hardening","OS baseline"],["Record","inventory"]],
            "tags": ["golden template","OS hardening","DNS/NTP","IP plan","drift control"] }
        ]},
        { "id": "network", "tone": "tone-2", "name": "NETWORK, SECURITY & TIME", "notes": [
          { "icon": "shield", "title": "Network, Security and Segmentation",
            "paragraphs": ["Firewall, VPN, DNS/DHCP, certificate and endpoint security are as critical as the application. Rules on FortiGate, pfSense or Mikrotik stay simple, traceable and segment-based; management, LP, client and internal traffic sit in separate segments, and LP/FIX links are opened only over whitelisted IPs and dedicated lines. To shrink the attack surface, management interfaces never face the internet and remote access sits behind VPN with 2FA."],
            "specs": [["Segments","mgmt/LP/client/internal"],["LP","IP whitelist"],["Remote","VPN + 2FA"]],
            "tags": ["FortiGate","pfSense","Mikrotik","segmentation","IP whitelist"] },
          { "icon": "clock", "title": "Time Synchronization: NTP/PTP and UTC Traceability",
            "paragraphs": ["Time is the silent backbone: order/tick timestamps, log correlation, certificates and TOTP all depend on a correct clock. Every server aligns to a common NTP source and timestamps must stay traceable to UTC with low divergence; where higher precision is needed, PTP can be used. Divergence and holdover are monitored continuously, because a drifting clock invalidates the very logs you rely on as evidence."],
            "specs": [["Source","common NTP"],["Protocol","NTP (opt. PTP)"],["Target","UTC traceability"],["Monitor","divergence / holdover"]],
            "tags": ["NTP","PTP","UTC traceability","holdover monitoring"] },
          { "icon": "activity", "title": "Monitoring and Observability: Golden Signals and Alert Thresholds",
            "paragraphs": ["Effective monitoring is built on the golden signals: latency, traffic/throughput, error rate and saturation are collected at every layer. Alert coverage spans latency, packet loss, disk queue, service state, log growth, backup-job results, certificate expiry, failed logins and LP/FIX session drops. Metrics are kept as time series with centralized logs (SIEM/syslog), and thresholds are set against a baseline rather than fixed numbers — the aim is to catch a fault while it is still silent, before a client notices."],
            "specs": [["Model","golden signals"],["Logs","SIEM/syslog"],["Thresholds","baseline"],["Scope","FIX + certs"]],
            "tags": ["golden signals","packet loss","disk queue","SIEM","cert expiry"] }
        ]},
        { "id": "platform", "tone": "tone-3", "name": "PLATFORM & CONTINUITY", "notes": [
          { "icon": "mt", "title": "MetaTrader 5 Core: Trade, History and Access Servers",
            "paragraphs": ["MT5 is a distributed, encrypted architecture that scales by adding servers. The Trade Server is the order/account/risk core (netting for exchange instruments, hedging for Forex); the History Server holds tick/bar history and handles (reverse) splits; Backup plus database encryption keep data continuous. The Access Server is the client-facing proxy and platform firewall: it packs authorization requests to the Trade Server, filters overload/attacks with antiflood, and caches history/DOM/news to offload the History Server. Its key benefit is hiding the core server IPs from the outside — under DDoS only the Access IPs are hit while the core stays unreachable — and multiple Access Servers are distributed geographically and chosen automatically by latency, load and priority."],
            "specs": [["Trade","netting/hedging"],["Access","proxy + antiflood"],["Core IP","hidden"],["Access","geo LB"]],
            "tags": ["Trade/History/Backup","Access Server","antiflood","IP hiding","geo load-balancing"] },
          { "icon": "api", "title": "Management, API and Gateway Layer",
            "paragraphs": ["MT5's control plane runs on role-based Manager/Admin rights — accountant, dealer, risk manager and administrator each defined with a distinct permission set. The platform extends through five APIs: Report API (reporting), Server API (Trade/History functions), Gateway API (external/LP integration), Manager API (custom admin tools) and Web API (web integration). Gateways bridge to exchanges and liquidity providers and let client risk be hedged instantly via STP; every plugin/gateway version is validated separately, because a plugin incompatible with the core can stall the live order flow."],
            "specs": [["Roles","accountant/dealer/risk"],["APIs","5 (Report…Web)"],["Gateway","STP hedge"]],
            "tags": ["Manager/Admin","Report/Server/Gateway/Manager/Web API","STP","plugin compatibility"] },
          { "icon": "dr", "title": "DR / DRC: RTO/RPO, Runbook and Failover Testing",
            "paragraphs": ["DR defines in advance, in a runbook, which service comes up in what order, how IP/DNS changes, which Access clients reconnect through, and to what point data is synchronized. RTO/RPO targets must be measurable; backups follow the 3-2-1 rule (3 copies, 2 media, 1 off-site) and are kept immutable/air-gapped against ransomware. Without periodic failover/failback drills and restore validation the setup gives no operational assurance, so DR is tested on a regular schedule."],
            "specs": [["Targets","RTO/RPO"],["Backup","3-2-1"],["Protection","immutable/air-gap"],["Test","periodic failover"]],
            "tags": ["RTO/RPO","3-2-1","immutable backup","failover runbook","restore test"] }
        ]},
        { "id": "liquidity", "tone": "tone-4", "name": "LIQUIDITY", "notes": [
          { "icon": "bridge", "title": "Bridge & FxCubic: LP Connectivity, Aggregation and Routing",
            "paragraphs": ["The bridge is the link between the trading platform and liquidity providers (tools such as FxCubic) — connecting MT4/MT5 or cTrader to LPs over its own FIX API. With aggregation the depth of several LPs is combined into a best bid/ask and VWAP; with priority/fallback, flow moves to the next LP when the primary has issues. Price filters reject stale and spike quotes, and markup (e.g. FxCubic's real-time markup API) is applied per account/group/symbol. Fill rate, rejection rate, latency, slippage and last-look behaviour are the measured metrics of daily operations."],
            "specs": [["Aggregation","best bid/ask"],["Failover","priority/fallback"],["Price","filter + markup"],["Metrics","fill/reject/slippage"]],
            "tags": ["FxCubic","aggregation","priority/fallback","markup","last look","slippage"] },
          { "icon": "link", "title": "FIX Connectivity and Session Management",
            "paragraphs": ["LP connectivity runs over FIX, and its two layers are treated separately. The session layer is the health of the link: Logon/Logout, Heartbeat and TestRequest for liveness; sequence numbers (MsgSeqNum) and gap-fill to detect and recover lost messages. The application layer is the business: MarketDataRequest/Snapshot for prices, NewOrderSingle → ExecutionReport for orders, with quotes and trades usually carried on separate sessions. A dropped session, a wrong sequence number or a stuck resend queue means no price or a hung order — so each session's state and latency is monitored on its own."],
            "specs": [["Session","Heartbeat/seq/gap-fill"],["Order","NewOrderSingle→ExecReport"],["Price","MarketData"],["Split","quote/trade session"]],
            "tags": ["FIX 4.4","heartbeat","sequence/gap-fill","NewOrderSingle","ExecutionReport"] },
          { "icon": "split", "title": "Order Routing Models: A-book / B-book / Hybrid",
            "paragraphs": ["Order routing is both an execution and a risk-appetite decision. A-book (STP) passes the order to an LP — the firm earns spread/commission and carries no market risk; B-book internalizes it — client PnL is the firm's opposite position, requiring capital and risk management. Hybrid splits flow between the two by rules on account/group/symbol/size and client profitability (e.g. routing consistently winning flow to A-book). A sound setup weighs net exposure, hedging cost, LP fill quality and regulatory/conflict-of-interest limits together, and measures them continuously."],
            "specs": [["A-book","STP, no risk"],["B-book","internal, risk"],["Hybrid","rule-based"],["Metric","net exposure"]],
            "tags": ["A-book/STP","B-book","hybrid","risk management","exposure"] }
        ]},
        { "id": "product", "tone": "tone-5", "name": "PRODUCT SETUP", "notes": [
          { "icon": "symbol", "title": "Symbol Management: Pricing, Contract Size, Digits, Execution Mode",
            "paragraphs": ["A symbol must have its digits, contract size, tick size/value, swap (and the triple-swap day), trading/quote sessions, margin and profit currency and LP mapping defined correctly from the start; otherwise margin, P/L, charts or order results can be wrong even when the price looks right. The MT5 execution mode (Market/Instant/Request/Exchange) and fill policy (FOK/IOC/Return) define how the symbol behaves; a mismatch produces requotes, rejects or unexpected slippage. For futures, rollover, closing the old contract, testing the new one and chart-history continuity are managed separately."],
            "specs": [["Contract","digits/size/tick"],["Execution","Market/Instant/Request"],["Fill","FOK/IOC/Return"],["Futures","rollover"]],
            "tags": ["digits","contract size","tick value","execution mode","fill policy","rollover"] },
          { "icon": "sliders", "title": "Spread, Commission and Group Configuration",
            "paragraphs": ["In MT5, client experience and the revenue model are largely set by group configuration. Spread markup, per-lot commission, min/max lot, lot step, execution, swap and symbol permissions are defined clearly per group, and whether markup is applied at the bridge or in the group spread is chosen deliberately to avoid double markup. VIP, standard, demo and institutional groups do not share one rule set — each needs its own commercial model, risk profile, swap-free handling and reporting."],
            "specs": [["Control","per group"],["Markup","bridge vs group"],["Params","commission/lot/swap"]],
            "tags": ["spread markup","commission","lot step","execution","group"] }
        ]},
        { "id": "ops", "tone": "tone-6", "name": "OPERATIONS & RISK", "notes": [
          { "icon": "change", "title": "Change Management and Regulatory Alignment",
            "paragraphs": ["In a live MT5 environment a small symbol/group/commission/leverage/session change directly affects client trading and regulatory alignment, so every change is validated in test, current/target values are recorded (maker-checker) and a rollback is ready. The binding regulator is SPK (with TSPB as the professional association): SPK caps retail leverage in Turkey at 10:1 (2017) and sets the rules on collateral, trading conditions, client-asset segregation and reporting; symbol, group, commission and leverage parameters are defined within this framework. When SPK/TSPB reporting, permissions and audit records are traceable, the operation is ready for both audit and incident analysis."],
            "specs": [["Process","maker-checker + rollback"],["Regulator","SPK / TSPB"],["Leverage","10:1 (2017)"],["Records","reporting + audit"]],
            "tags": ["maker-checker","SPK 10:1","collateral","reporting","audit"] },
          { "icon": "risk", "title": "Risk and Access Control: Leverage, Margin Call, Stop-Out, 2FA",
            "paragraphs": ["Leverage, margin call and stop-out set the firm's risk directly. Leverage is tiered by product/group/equity; margin call is the warning threshold and stop-out the forced-liquidation threshold (e.g. margin level 100% warning / 50% stop-out placed deliberately). Total exposure and per-symbol position limits, dealer limits and, when needed, a kill switch are defined. 2FA/TOTP, manager rights and user access belong to the same risk frame; if the permission matrix is unclear, a technical gap turns straight into operational risk."],
            "specs": [["Leverage","tiered"],["Stop-out","level %"],["Limits","exposure/dealer"],["Access","2FA + matrix"]],
            "tags": ["leverage","margin call","stop-out","kill switch","2FA/TOTP","exposure limit"] }
        ]}
      ],
      "closing": {
        "icon": "flag",
        "label": "SUMMARY",
        "title": "End-to-End Trading Infrastructure",
        "paragraphs": ["The goal of end-to-end trading infrastructure is a platform that runs with stability, observability and continuity; reversible when needed, aligned with regulation, tested through failover and sustainable in daily operations. These notes are the decisions that make that platform measurable and defensible — from host to LP."],
        "tags": ["stable","observable","reversible","regulation-aligned","tested"]
      }
    }
  };

  const $ = (id) => document.getElementById(id);
  const body = document.body;
  const langToggleBtn = $('lang-toggle');
  const themeToggleBtn = $('theme-toggle');
  const iconSun = $('icon-sun');
  const iconMoon = $('icon-moon');
  const timelineEl = $('timeline');
  const legendEl = $('legend');

  function svgIcon(key){
    return '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">' + (ICONS[key] || '') + '</svg>';
  }
  function pad(n){ return String(n).padStart(2, '0'); }

  function buildCard(note){
    const card = document.createElement('div');
    card.className = 'step-card';

    note.paragraphs.forEach((par) => {
      const p = document.createElement('p');
      p.className = 'step-text';
      p.textContent = par;
      card.appendChild(p);
    });

    if (note.specs && note.specs.length){
      const sp = document.createElement('div');
      sp.className = 'specs';
      note.specs.forEach(([k, v]) => {
        const s = document.createElement('span'); s.className = 'spec';
        const kk = document.createElement('span'); kk.className = 'spec-k'; kk.textContent = k;
        const vv = document.createElement('span'); vv.className = 'spec-v'; vv.textContent = v;
        s.append(kk, vv);
        sp.appendChild(s);
      });
      card.appendChild(sp);
    }

    return card;
  }

  function renderTimeline(d){
    timelineEl.innerHTML = '';
    legendEl.innerHTML = '';

    const total = d.phases.reduce((a, p) => a + p.notes.length, 0);
    let idx = 0;

    d.phases.forEach((phase) => {
      const li = document.createElement('button');
      li.className = 'legend-item ' + phase.tone;
      li.setAttribute('role', 'listitem');
      li.type = 'button';
      li.innerHTML = '<span class="legend-dot"></span>' + phase.name;
      li.addEventListener('click', () => {
        const target = document.getElementById('phase-' + phase.id);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      legendEl.appendChild(li);

      const wrap = document.createElement('section');
      wrap.className = 'phase ' + phase.tone;
      wrap.id = 'phase-' + phase.id;

      const label = document.createElement('div');
      label.className = 'phase-label';
      const start = idx + 1;
      const end = idx + phase.notes.length;
      label.innerHTML =
        '<span class="phase-dot"></span>' +
        '<span class="phase-name">' + phase.name + '</span>' +
        '<span class="phase-line"></span>' +
        '<span class="phase-range">' + pad(start) + (end > start ? '–' + pad(end) : '') + '</span>';
      wrap.appendChild(label);

      phase.notes.forEach((note) => {
        idx++;
        const step = document.createElement('div');
        step.className = 'step';

        const rail = document.createElement('div');
        rail.className = 'step-rail';
        const nico = document.createElement('div');
        nico.className = 'node-ico';
        nico.innerHTML = svgIcon(note.icon);
        rail.appendChild(nico);

        const card = buildCard(note);
        const top = document.createElement('div');
        top.className = 'step-top';
        const bidx = document.createElement('span');
        bidx.className = 'step-idx';
        bidx.textContent = pad(idx) + ' / ' + pad(total);
        const title = document.createElement('span');
        title.className = 'step-title';
        title.textContent = note.title;
        top.append(bidx, title);
        card.insertBefore(top, card.firstChild);

        step.append(rail, card);
        wrap.appendChild(step);
      });

      timelineEl.appendChild(wrap);
    });

    // closing block
    const c = d.closing;
    const closing = document.createElement('section');
    closing.className = 'closing';
    const ctop = document.createElement('div');
    ctop.className = 'closing-top';
    const cico = document.createElement('div');
    cico.className = 'closing-ico';
    cico.innerHTML = svgIcon(c.icon);
    const chead = document.createElement('div');
    const clabel = document.createElement('span');
    clabel.className = 'closing-label';
    clabel.textContent = c.label;
    const ctitle = document.createElement('h2');
    ctitle.className = 'closing-title';
    ctitle.textContent = c.title;
    chead.append(clabel, ctitle);
    ctop.append(cico, chead);
    closing.appendChild(ctop);
    c.paragraphs.forEach((par) => {
      const p = document.createElement('p');
      p.className = 'closing-text';
      p.textContent = par;
      closing.appendChild(p);
    });
    timelineEl.appendChild(closing);
  }

  function updateUI(lang){
    const d = content[lang];
    document.documentElement.lang = lang;
    langToggleBtn.setAttribute('aria-label', d.uiLangSwitch); langToggleBtn.title = d.uiLangSwitch;
    themeToggleBtn.setAttribute('aria-label', d.uiTheme);     themeToggleBtn.title = d.uiTheme;
    $('lang-text').textContent = d.langBtn;
    $('back-link').textContent = d.backLink;
    $('kicker').textContent = d.kicker;
    $('page-title').textContent = d.pageTitle;
    $('page-lede').textContent = d.pageLede;
    $('hero-count').textContent = d.metaCount;
    renderTimeline(d);
    $('footer-line').textContent = '© ' + new Date().getFullYear() + ' Coşkun Parlar';
  }

  function setTheme(theme){
    body.classList.remove('dark-mode', 'light-mode');
    body.classList.add(theme);
    const isLight = theme === 'light-mode';
    iconSun.style.display = isLight ? 'none' : 'block';
    iconMoon.style.display = isLight ? 'block' : 'none';
  }

  langToggleBtn.addEventListener('click', () => {
    const next = (document.documentElement.lang === 'tr') ? 'en' : 'tr';
    storage.set('lang', next);
    updateUI(next);
  });
  themeToggleBtn.addEventListener('click', () => {
    const next = body.classList.contains('light-mode') ? 'dark-mode' : 'light-mode';
    storage.set('theme', next);
    setTheme(next);
  });

  const progress = $('progress');
  function onScroll(){
    const el = document.documentElement;
    const max = el.scrollHeight - el.clientHeight;
    const p = max > 0 ? Math.min(1, Math.max(0, el.scrollTop / max)) : 0;
    progress.style.width = (p * 100).toFixed(2) + '%';
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll);

  const storedLang = storage.get('lang') || 'tr';
  updateUI(storedLang);
  setTheme(body.classList.contains('light-mode') ? 'light-mode' : 'dark-mode');
  onScroll();
});
</script>
</body>
</html>
