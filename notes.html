<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Coşkun Parlar — Uçtan Uca Trading Altyapısı Kurulum Notları" />
<title>Teknik Notlar — Coşkun Parlar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:        #0a0c10;
    --border:     #232a35;
    --border-2:   #2c3441;
    --text:       #e9e6dd;
    --text-dim:   #a7aeb9;
    --text-mute:  #6d7684;
    --amber:      #f0a940;
    --amber-dim:  #c98a34;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'IBM Plex Sans',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --container: 780px;
    --ease: cubic-bezier(.22,.7,.2,1);
  }
  body.light-mode{
    --ink:        #f6f4ee;
    --border:     #ddd8cb;
    --border-2:   #c9c3b3;
    --text:       #16181c;
    --text-dim:   #4c5259;
    --text-mute:  #7c8189;
    --amber:      #b3690f;
    --amber-dim:  #8f5309;
  }
  *,*::before,*::after{box-sizing:border-box}
  @media (prefers-reduced-motion:reduce){ *,*::before,*::after{animation-duration:.001ms !important;transition-duration:.001ms !important} }
  html,body{margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;transition:background .35s var(--ease),color .35s var(--ease)}
  a{color:inherit;text-decoration:none}
  ul{margin:0;padding:0;list-style:none}
  h1,h2{font-family:var(--font-display);margin:0;letter-spacing:-.01em}
  p{margin:0}
  .wrap{max-width:var(--container);margin:0 auto;padding:0 28px}
  ::selection{background:var(--amber);color:var(--ink)}
  :focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:2px}

  .corner-controls{
    position:fixed;top:18px;right:18px;z-index:100;display:flex;gap:6px;
    background:color-mix(in srgb, var(--ink) 70%, transparent);backdrop-filter:blur(8px);
    border:1px solid var(--border);border-radius:999px;padding:5px;
  }
  .ctrl-btn{
    background:transparent;border:none;color:var(--text-dim);font-family:var(--font-mono);font-size:.7rem;
    width:34px;height:34px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
    transition:color .2s var(--ease),background .2s var(--ease);
  }
  .ctrl-btn:hover{color:var(--amber);background:var(--border)}
  .ctrl-btn svg{width:15px;height:15px}

  header.top{padding:90px 0 50px}
  .back-link{
    display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:.78rem;
    color:var(--text-mute);margin-bottom:28px;transition:color .2s var(--ease);
  }
  .back-link:hover{color:var(--amber)}
  .kicker{font-family:var(--font-mono);font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:16px}
  h1.title{font-size:clamp(2rem,4.4vw,2.8rem);font-weight:700;line-height:1.1;margin-bottom:18px}
  .lede{font-size:1.05rem;line-height:1.75;color:var(--text-dim);max-width:60ch}

  main{padding-bottom:100px}
  .note{padding:44px 0;border-top:1px solid var(--border)}
  .note:first-child{border-top:1px solid var(--border)}
  .note-num{font-family:var(--font-mono);font-size:.74rem;color:var(--text-mute);margin-bottom:10px}
  .note h2{font-size:1.3rem;font-weight:600;margin-bottom:16px}
  .note p{color:var(--text-dim);font-size:.98rem;line-height:1.8;margin-bottom:14px}
  .note p:last-child{margin-bottom:0}
  .note code{font-family:var(--font-mono);font-size:.88em;background:var(--border);padding:1px 6px;border-radius:4px;color:var(--text)}

  footer{padding:30px 0 50px;border-top:1px solid var(--border)}
  .footer-line{font-family:var(--font-mono);font-size:.72rem;color:var(--text-mute)}

  @media (max-width:640px){
    .wrap{padding:0 20px}
    header.top{padding:78px 0 36px}
  }
</style>
</head>
<body class="dark-mode">

<div class="corner-controls">
  <button id="lang-toggle" class="ctrl-btn" title="Dili değiştir / Switch language"><span id="lang-text">EN</span></button>
  <button id="theme-toggle" class="ctrl-btn" title="Tema değiştir">
    <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<div class="wrap">
  <header class="top">
    <a href="index.html" class="back-link" id="back-link">← CV'ye dön</a>
    <div class="kicker" id="kicker"></div>
    <h1 class="title" id="page-title"></h1>
    <p class="lede" id="page-lede"></p>
  </header>
</div>

<main class="wrap" id="notes-container"></main>

<footer>
  <div class="wrap footer-line" id="footer-line"></div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const content = {
    "tr": {
        "langBtn": "EN",
        "backLink": "← CV'ye dön",
        "kicker": "Teknik Notlar",
        "pageTitle": "Uçtan Uca Trading Altyapısı Kurulum Notları",
        "pageLede": "",
        "notes": [
            {
                "title": "Host Sunucu: Kapasiteyi Sadece CPU/RAM Olarak Görmemek",
                "paragraphs": [
                    "Kurulumun ilk noktası fiziksel host tasarımıdır. CPU, RAM ve disk alanı kadar NIC sayısı, HBA kartları, PSU yedekliliği, firmware/driver uyumu ve iLO/iDRAC üzerinden out-of-band management erişimi de canlı ortam için kritiktir. Trading sistemlerinde kapasite, mevcut yükü çalıştırmak için değil; host kaybı veya bakım senaryosunda servisleri başka node üzerinde güvenli şekilde taşıyabilecek N+1 rezervle planlanmalıdır."
                ]
            },
            {
                "title": "Storage Tasarımı: Performans, Güvenlik ve Rebuild Riski",
                "paragraphs": [
                    "Storage tarafında RAID seviyesi, disk tipi, datastore ayrımı ve latency alarm eşikleri doğrudan platform stabilitesini etkiler. Büyük kapasiteli disklerde rebuild süresi uzadığı için kritik iş yüklerinde RAID 5 yerine RAID 6 veya yüksek IOPS gereken servislerde RAID 10 tercih ederim. Buradaki hedef yalnızca veri kaybını önlemek değil; rebuild, snapshot veya backup anında trading VM'lerinin I/O gecikmesini kontrol altında tutmaktır."
                ]
            },
            {
                "title": "ESXi Kurulumu: Network ve Multipath Ayrımı",
                "paragraphs": [
                    "ESXi kurulumunda management, vMotion, storage ve production trafiği ayrı VLAN/port group yapısıyla tasarlanmalıdır. NIC teaming, MTU ve storage multipathing ayarlarında varsayılan değerlere güvenmem; PSP/SATP seçimi storage vendor önerisine göre doğrulanır. Yanlış path policy veya hatalı network ayrımı, storage tarafındaki kısa bir problemi VM outage seviyesine taşıyabilir."
                ]
            },
            {
                "title": "vCenter & HA/DRS: Kapasite, Placement ve Failover Kontrolü",
                "paragraphs": [
                    "vCenter kurulumunda HA, DRS, admission control ve anti-affinity kuralları birlikte düşünülmelidir. Özellikle birbirinin yedeği olan trading node'lar aynı fiziksel host üzerinde konumlanmamalıdır. HA'nın amacı yalnızca VM'i yeniden başlatmak değil; host kaybında yeterli kapasite, doğru network erişimi ve doğru placement ile servisin kontrollü şekilde devam etmesini sağlamaktır."
                ]
            },
            {
                "title": "VM Kurulumları: Rol Bazlı Ayrım ve Standartlaştırma",
                "paragraphs": [
                    "VM kurulumunda her sunucunun rolü baştan net olmalıdır: Trade, History, Access, Backup/DR, bridge, monitoring veya integration gibi. Disk yapısı, VLAN, DNS, NTP, hostname, IP planı, OS hardening ve servis hesabı standardize edilirse canlı ortamda arıza analizi hızlanır. Envanter ve konfigürasyon standardı yoksa hangi servisin nerede, hangi bağımlılıkla çalıştığını tespit etmek operasyonel riske dönüşür."
                ]
            },
            {
                "title": "Ağ, Güvenlik ve İzleme: Sessiz Hataları Erken Yakalamak",
                "paragraphs": [
                    "Trading altyapısında firewall, VPN, DNS/DHCP, NTP, sertifika ve endpoint güvenliği uygulama kadar kritiktir. FortiGate, pfSense veya Mikrotik tarafında erişim kuralları sade, izlenebilir ve segment bazlı olmalı; management, LP, client ve internal servis trafiği birbirinden ayrılmalıdır. İzleme tarafında yalnızca up/down yeterli değildir; latency, packet loss, disk queue, servis durumu, log büyümesi, backup job sonucu, sertifika süresi ve hatalı login denemeleri de alarm kapsamına alınmalıdır."
                ]
            },
            {
                "title": "MetaTrader Kurulumu: Bileşenleri Doğru Konumlandırmak",
                "paragraphs": [
                    "MetaTrader tarafında kritik konu bileşenleri doğru role ve doğru lokasyona dağıtmaktır. Trade Server, History Server, Access Server ve Backup/DR yapısı network gecikmesi, disk I/O, log büyümesi ve erişim güvenliği dikkate alınarak konumlandırılmalıdır. Build, plugin ve bridge versiyon uyumluluğu test ortamında doğrulanmalı; canlı geçişte bakım penceresi, config backup ve rollback planı hazır olmalıdır."
                ]
            },
            {
                "title": "DR / DRC: Kurulu Olması Yetmez, Test Edilmesi Gerekir",
                "paragraphs": [
                    "DR/DRC tarafında amaç yalnızca yedek sunucu bulundurmak değildir. Olay anında hangi servis hangi sırayla ayağa kalkacak, IP/DNS değişikliği nasıl yapılacak, kullanıcılar hangi access üzerinden bağlanacak ve veri senkronizasyonu hangi noktada olacak önceden belirlenmelidir. RTO/RPO hedefleri, failover runbook'u ve periyodik test olmadan DR yapısı operasyonel güvence sağlamaz."
                ]
            },
            {
                "title": "Bridge & FxCubic: LP Bağlantısı, Routing ve İzleme",
                "paragraphs": [
                    "FxCubic gibi bridge katmanında LP bağlantıları, FIX session durumları, sembol mapping, fiyat filtreleri ve emir yönlendirme kuralları yönetilir. Aggregation yapısında birden fazla LP'den gelen fiyatlar birleştirilerek en iyi bid/ask oluşturulur; priority yapısında ise birincil LP sorun yaşarsa akış sıradaki LP'ye yönlenir. Fill rate, rejection rate, latency, stale price ve fiyat sapması kontrolleri günlük operasyonun parçası olmalıdır."
                ]
            },
            {
                "title": "Sembol Yönetimi: Fiyat, Contract Size, Digits ve Session Saatleri",
                "paragraphs": [
                    "Sembol açmak yalnızca ismi eklemek değildir. Digits, contract size, tick size, swap, trading session, quote session, margin currency, profit currency ve LP mapping doğru değilse fiyat doğru görünse bile teminat, P/L, grafik veya emir sonucu hatalı olabilir. Vadeli ürünlerde rollover, eski kontratın kapatılması, yeni kontratın test edilmesi ve chart history sürekliliği ayrıca takip edilmelidir."
                ]
            },
            {
                "title": "Spread, Komisyon ve Grup Ayarları",
                "paragraphs": [
                    "MetaTrader'da müşteri deneyimi ve kurum gelir modeli büyük ölçüde group ayarlarıyla belirlenir. Spread markup, lot başı komisyon, minimum/maximum lot, lot step, execution, swap ve sembol izinleri grup bazında net tanımlanmalıdır. VIP, standart, demo ve kurumsal gruplar aynı kurallarla çalışmamalıdır; her grubun ticari modeli, risk profili ve raporlama ihtiyacı ayrı değerlendirilmelidir."
                ]
            },
            {
                "title": "Değişiklik Yönetimi ve Regülasyon Uyumu",
                "paragraphs": [
                    "Canlı MetaTrader ortamında küçük görünen bir sembol, grup, komisyon, kaldıraç veya session değişikliği doğrudan müşteri işlemini ve regülasyon uyumunu etkileyebilir. Bu yüzden değişiklikler test ortamında doğrulanmalı, canlıya alınmadan önce mevcut/yeni değerler kayıt altına alınmalı ve geri dönüş planı hazırlanmalıdır. SPK/TSPB kapsamındaki raporlama, erişim yetkileri, işlem koşulları ve audit kayıtları izlenebilir olduğunda operasyon hem denetime hem de olay analizine hazır olur."
                ]
            },
            {
                "title": "Risk ve Erişim Kontrolü: Leverage, Margin Call, Stop-Out ve 2FA",
                "paragraphs": [
                    "Leverage, margin call ve stop-out ayarları doğrudan kurum riskini etkiler. Kaldıraç ürün, grup veya equity seviyesine göre kademeli tanımlanmalı; margin call uyarı, stop-out ise zorunlu kapama eşiği olarak doğru seviyeye konumlandırılmalıdır. 2FA/TOTP, manager yetkileri ve kullanıcı erişimleri aynı risk çerçevesinin parçasıdır; yetki matrisi net değilse teknik güvenlik açığı doğrudan operasyonel riske dönüşür."
                ]
            },
            {
                "title": "Uçtan Uca Trading Altyapısı",
                "paragraphs": [
                    "Uçtan uca trading altyapısında amaç; stabil, izlenebilir ve kesintisiz çalışan; gerektiğinde geri alınabilir, regülasyonla uyumlu, failover senaryoları test edilmiş ve günlük operasyonda sürdürülebilir bir platform oluşturmaktır."
                ]
            }
        ],
        "footerLine": "Coşkun Parlar — İstanbul"
    },
    "en": {
        "langBtn": "TR",
        "backLink": "← Back to CV",
        "kicker": "Technical Notes",
        "pageTitle": "End-to-End Trading Infrastructure Setup Notes",
        "pageLede": "",
        "notes": [
            {
                "title": "Host Servers: Capacity Is More Than CPU and RAM",
                "paragraphs": [
                    "The first layer is physical host design. CPU, memory and disk capacity matter, but so do NIC count, HBA cards, PSU redundancy, firmware/driver compatibility and out-of-band management access through iLO/iDRAC. In a trading environment, capacity should not be planned only for the current workload; it must include N+1 headroom so services can move safely to another node during host failure or maintenance."
                ]
            },
            {
                "title": "Storage Design: Performance, Protection and Rebuild Risk",
                "paragraphs": [
                    "RAID level, disk type, datastore separation and latency thresholds directly affect platform stability. On large disks, rebuild windows can be long, so I avoid RAID 5 for critical workloads and prefer RAID 6 or RAID 10 for high-IOPS services. The goal is not only to prevent data loss, but also to keep I/O latency under control during rebuild, snapshot or backup activity."
                ]
            },
            {
                "title": "ESXi Setup: Network Separation and Multipathing",
                "paragraphs": [
                    "In ESXi, management, vMotion, storage and production traffic should be separated through dedicated VLANs and port groups. I do not rely blindly on defaults for NIC teaming, MTU or storage multipathing; PSP/SATP settings must match the storage vendor's recommendation. A wrong path policy or weak network separation can turn a short storage issue into a VM-level outage."
                ]
            },
            {
                "title": "vCenter & HA/DRS: Capacity, Placement and Failover Control",
                "paragraphs": [
                    "vCenter design requires HA, DRS, admission control and anti-affinity rules to be planned together. Redundant trading nodes should not end up on the same physical host. HA is not only about restarting a VM; it must provide enough capacity, network reachability and correct placement so services can continue in a controlled way after a host failure."
                ]
            },
            {
                "title": "VM Provisioning: Role-Based and Standardized",
                "paragraphs": [
                    "Each VM should have a clear role from the beginning: Trade, History, Access, Backup/DR, bridge, monitoring or integration. Disk layout, VLAN, DNS, NTP, hostname, IP plan, OS hardening and service accounts should be standardized to speed up production troubleshooting. Without configuration inventory, identifying which service runs where and with which dependency becomes an operational risk."
                ]
            },
            {
                "title": "Network, Security and Monitoring: Catching Silent Failures Early",
                "paragraphs": [
                    "In trading infrastructure, firewall, VPN, DNS/DHCP, NTP, certificate and endpoint security are as critical as the application itself. Access rules on FortiGate, pfSense or Mikrotik should be simple, traceable and segment-based; management, LP, client and internal service traffic must be separated. Monitoring must go beyond up/down state: latency, packet loss, disk queue, service status, log growth, backup job results, certificate expiry and failed login attempts should also trigger alerts."
                ]
            },
            {
                "title": "MetaTrader Deployment: Correct Component Placement",
                "paragraphs": [
                    "The critical part is placing each MetaTrader component on the right role and location. Trade Server, History Server, Access Server and Backup/DR roles must be positioned with latency, disk I/O, log growth and access security in mind. Build, plugin and bridge-version compatibility should be validated in test; production release should include a maintenance window, configuration backup and rollback plan."
                ]
            },
            {
                "title": "DR / DRC: It Must Be Tested",
                "paragraphs": [
                    "DR/DRC is not only about having a backup server. The failover order, IP/DNS changes, access routing and data synchronization point must be defined before an incident. Without RTO/RPO targets, a failover runbook and periodic testing, the DR environment does not provide operational assurance."
                ]
            },
            {
                "title": "Bridge & FxCubic: LP Connectivity, Routing and Monitoring",
                "paragraphs": [
                    "At the bridge layer, tools such as FxCubic manage LP connectivity, FIX sessions, symbol mapping, price filters and order-routing rules. With aggregation, quotes from multiple LPs are combined into a best bid/ask; with priority routing, flow can move to the next LP when the primary LP has issues. Fill rate, rejection rate, latency, stale-price and price-deviation checks should be part of daily operations."
                ]
            },
            {
                "title": "Symbol Management: Pricing, Contract Size, Digits and Sessions",
                "paragraphs": [
                    "Adding a symbol is not just adding a name. Digits, contract size, tick size, swap, trading sessions, quote sessions, margin currency, profit currency and LP mapping must be correct. Otherwise the price may look right while margin, P/L, chart data or order results are wrong. For futures, rollover, contract closure, new-contract testing and chart-history continuity must be tracked separately."
                ]
            },
            {
                "title": "Spread, Commission and Group Configuration",
                "paragraphs": [
                    "In MetaTrader, client experience and broker revenue model are largely controlled at group level. Spread markup, per-lot commission, min/max lot, lot step, execution, swap and symbol permissions must be defined clearly per group. VIP, standard, demo and institutional groups should not share the same rule set; each group needs its own commercial model, risk profile and reporting requirement."
                ]
            },
            {
                "title": "Change Management and Regulatory Alignment",
                "paragraphs": [
                    "In a live MetaTrader environment, even a small symbol, group, commission, leverage or session change can directly affect client trading and regulatory alignment. Changes should be validated in test, current and target values should be recorded before production release, and a rollback plan should be ready. When CMB/TSPB reporting, access permissions, trading conditions and audit records are traceable, the operation is prepared for both audits and incident analysis."
                ]
            },
            {
                "title": "Risk and Access Control: Leverage, Margin Call, Stop-Out and 2FA",
                "paragraphs": [
                    "Leverage, margin call and stop-out settings directly affect broker risk. Leverage should be tiered by product, group or equity level; margin call is the warning threshold, while stop-out is the forced-liquidation threshold. 2FA/TOTP, manager permissions and user access belong to the same risk framework; if the permission matrix is unclear, a technical security gap becomes an operational risk."
                ]
            },
            {
                "title": "End-to-End Trading Infrastructure",
                "paragraphs": [
                    "The goal of end-to-end trading infrastructure is to build a platform that runs with stability, observability and continuity; remains reversible when needed, aligned with regulation, tested through failover scenarios and sustainable in daily operations."
                ]
            }
        ],
        "footerLine": "Coskun Parlar — Istanbul"
    }
};

  const els = {
    langText: document.getElementById('lang-text'),
    backLink: document.getElementById('back-link'),
    kicker: document.getElementById('kicker'),
    pageTitle: document.getElementById('page-title'),
    pageLede: document.getElementById('page-lede'),
    container: document.getElementById('notes-container'),
    footerLine: document.getElementById('footer-line'),
  };

  function updateUI(lang){
    const d = content[lang];
    document.documentElement.lang = lang;
    els.langText.textContent = d.langBtn;
    els.backLink.textContent = d.backLink;
    els.kicker.textContent = d.kicker;
    els.pageTitle.textContent = d.pageTitle;
    els.pageLede.textContent = d.pageLede;
    els.pageLede.style.display = d.pageLede ? 'block' : 'none';

    els.container.innerHTML = '';
    d.notes.forEach((n, i)=>{
      const sec = document.createElement('div'); sec.className = 'note';
      const num = document.createElement('div'); num.className = 'note-num';
      num.textContent = String(i+1).padStart(2,'0') + ' / ' + String(d.notes.length).padStart(2,'0');
      const h2 = document.createElement('h2'); h2.textContent = n.title;
      sec.append(num, h2);
      n.paragraphs.forEach(par=>{
        const p = document.createElement('p'); p.textContent = par; sec.appendChild(p);
      });
      els.container.appendChild(sec);
    });

    els.footerLine.textContent = d.footerLine;
  }

  const body = document.body;
  const langToggleBtn = document.getElementById('lang-toggle');
  const themeToggleBtn = document.getElementById('theme-toggle');
  const iconSun = document.getElementById('icon-sun');
  const iconMoon = document.getElementById('icon-moon');

  langToggleBtn.addEventListener('click', ()=>{
    const next = (document.documentElement.lang === 'tr') ? 'en' : 'tr';
    localStorage.setItem('lang', next);
    updateUI(next);
  });
  themeToggleBtn.addEventListener('click', ()=>{
    if(body.classList.contains('light-mode')){
      body.classList.remove('light-mode'); body.classList.add('dark-mode');
      iconSun.style.display='block'; iconMoon.style.display='none';
      localStorage.setItem('theme','dark-mode');
    } else {
      body.classList.remove('dark-mode'); body.classList.add('light-mode');
      iconSun.style.display='none'; iconMoon.style.display='block';
      localStorage.setItem('theme','light-mode');
    }
  });

  const storedLang = localStorage.getItem('lang') || 'tr';
  updateUI(storedLang);
  const storedTheme = localStorage.getItem('theme');
  if(storedTheme){
    body.classList.add(storedTheme);
    if(storedTheme === 'light-mode'){ iconSun.style.display='none'; iconMoon.style.display='block'; }
  } else {
    body.classList.add('dark-mode');
  }
});
</script>
</body>
</html>
