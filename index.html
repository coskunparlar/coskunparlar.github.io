<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Coşkun Parlar — System, Network & Trading Infrastructure Manager" />
<title>Coşkun Parlar — System &amp; Trading Infrastructure</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  @view-transition {
    navigation: auto;
  }
  ::view-transition-old(root),
  ::view-transition-new(root){
    animation-duration: .32s;
    animation-timing-function: cubic-bezier(.22,.7,.2,1);
  }

  :root{
    --ink:        #0a0c10;
    --border:     #232a35;
    --border-2:   #2c3441;
    --text:       #e9e6dd;
    --text-dim:   #a7aeb9;
    --text-mute:  #6d7684;
    --amber:      #f0a940;
    --amber-dim:  #c98a34;

    --font-display:'Inter',Arial,Helvetica,sans-serif;
    --font-body:'Inter',Arial,Helvetica,sans-serif;
    --font-mono:'IBM Plex Mono','SFMono-Regular',Consolas,monospace;

    --container: 1160px;
    --ease: cubic-bezier(.22,.7,.2,1);
  }

  body.light-mode{
    --ink:        #f6f4ee;
    --border:     #ddd8cb;
    --border-2:   #c9c3b3;
    --text:       #16181c;
    --text-dim:   #4c5259;
    --text-mute:  #7c8189;
    --amber:      #b3690f;
    --amber-dim:  #8f5309;
  }

  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;scroll-behavior:auto !important}
  }
  html,body{margin:0;padding:0}
  body{
    background:var(--ink);color:var(--text);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    transition:background .35s var(--ease),color .35s var(--ease);
  }

  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  ul{margin:0;padding:0;list-style:none}
  h1,h2,h3{font-family:var(--font-display);margin:0;letter-spacing:-.01em}
  p{margin:0}
  button{font:inherit}

  .wrap{max-width:var(--container);margin:0 auto;padding:0 32px}
  ::selection{background:var(--amber);color:var(--ink)}
  :focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:2px}

  /* corner controls */
  .corner-controls{
    position:fixed;top:18px;right:18px;z-index:100;
    display:flex;gap:6px;
    background:color-mix(in srgb, var(--ink) 70%, transparent);
    backdrop-filter:blur(8px);
    border:1px solid var(--border);border-radius:999px;padding:5px;
  }
  .ctrl-btn{
    background:transparent;border:none;color:var(--text-dim);
    font-family:var(--font-mono);font-size:.7rem;letter-spacing:.05em;
    width:34px;height:34px;border-radius:999px;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    transition:color .2s var(--ease),background .2s var(--ease);
  }
  .ctrl-btn:hover{color:var(--amber);background:var(--border)}
  .ctrl-btn svg{width:15px;height:15px}
  #lang-toggle{width:auto;padding:0 12px}
  #cmdk-toggle{width:auto;padding:0 11px;gap:5px}
  .kbd{
    font-family:var(--font-mono);font-size:.62rem;color:var(--text-mute);
    border:1px solid var(--border-2);border-radius:4px;padding:1px 5px;line-height:1.4;
  }

  /* command palette */
  .cmdk-overlay{
    position:fixed;inset:0;z-index:300;background:color-mix(in srgb, var(--ink) 55%, transparent);
    backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;
    padding-top:14vh;opacity:0;pointer-events:none;transition:opacity .18s var(--ease);
  }
  .cmdk-overlay.open{opacity:1;pointer-events:auto}
  .cmdk-panel{
    width:100%;max-width:560px;margin:0 20px;background:var(--ink);border:1px solid var(--border-2);
    border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,.5);overflow:hidden;
    transform:translateY(-10px) scale(.98);transition:transform .18s var(--ease);
  }
  .cmdk-overlay.open .cmdk-panel{transform:translateY(0) scale(1)}
  .cmdk-input-row{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
  .cmdk-input-row svg{width:16px;height:16px;color:var(--text-mute);flex-shrink:0}
  #cmdk-input{
    flex:1;background:none;border:none;outline:none;color:var(--text);
    font-family:var(--font-body);font-size:.96rem;
  }
  #cmdk-input::placeholder{color:var(--text-mute)}
  .cmdk-list{max-height:320px;overflow-y:auto;padding:6px}
  .cmdk-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 12px;border-radius:8px;cursor:pointer;color:var(--text-dim);font-size:.9rem;
  }
  .cmdk-item.selected{background:var(--border);color:var(--text)}
  .cmdk-item-label{display:flex;align-items:center;gap:10px}
  .cmdk-item-icon{width:15px;height:15px;color:var(--text-mute);flex-shrink:0}
  .cmdk-item.selected .cmdk-item-icon{color:var(--amber)}
  .cmdk-item-tag{font-family:var(--font-mono);font-size:.68rem;color:var(--text-mute)}
  .cmdk-empty{padding:24px 16px;text-align:center;color:var(--text-mute);font-size:.86rem}

  /* layout: sidebar + content */
  .layout{display:grid;grid-template-columns:300px 1fr;gap:64px;padding:100px 0 60px;align-items:start}

  .sidebar{position:sticky;top:60px;display:flex;flex-direction:column;gap:26px}
  .sidebar-photo img{width:64px;height:64px;border-radius:50%;object-fit:cover;border:1px solid var(--border-2);filter:grayscale(.1)}
  .sidebar-name{font-size:1.7rem;font-weight:700;line-height:1.15}
  .sidebar-role{font-family:var(--font-body);font-size:.86rem;font-weight:600;color:var(--amber-dim);letter-spacing:.01em;margin-top:8px;line-height:1.5}
  .sidebar-bio{font-size:.92rem;line-height:1.75;color:var(--text-dim)}

  .sidebar-nav{display:flex;flex-direction:column;gap:13px}
  .sidebar-nav a{
    font-family:var(--font-body);font-size:.84rem;font-weight:500;letter-spacing:0;color:var(--text-mute);
    display:flex;align-items:center;gap:12px;transition:color .2s var(--ease);
  }
  .sidebar-nav a::before{content:'';width:16px;height:1px;background:var(--border-2);transition:width .2s var(--ease),background .2s var(--ease)}
  .sidebar-nav a:hover{color:var(--text)}
  .sidebar-nav a.active{color:var(--text)}
  .sidebar-nav a.active::before{width:28px;background:var(--amber)}
  .sidebar-nav a.external-link .external-icon{
    width:13px;height:13px;margin-left:2px;flex-shrink:0;color:var(--text-mute);
    transition:color .2s var(--ease),transform .2s var(--ease);
  }
  .sidebar-nav a.external-link:hover .external-icon{color:var(--amber);transform:translate(1px,-1px)}

  .sidebar-meta{font-family:var(--font-body);font-size:.84rem;font-weight:500;color:var(--text-mute);line-height:1.8}
  .sidebar-social{display:flex;gap:16px}
  .sidebar-social a{color:var(--text-mute);transition:color .2s var(--ease),transform .2s var(--ease)}
  .sidebar-social a:hover{color:var(--amber);transform:translateY(-2px)}
  .sidebar-social svg{width:19px;height:19px}

  .content{min-width:0}
  .content-section{padding-bottom:96px;scroll-margin-top:40px}
  .content-section:last-child{padding-bottom:20px}
  .section-title{
    font-size:clamp(1.4rem,2.2vw,1.7rem);font-weight:600;margin-bottom:14px;
    position:relative;padding-bottom:14px;
  }
  .section-title::after{content:'';position:absolute;left:0;bottom:0;width:32px;height:3px;background:var(--amber)}
  .section-intro{color:var(--text-dim);font-size:1rem;line-height:1.7;max-width:62ch;margin:20px 0 4px}

  .animated-section{opacity:1;transform:none;transition:opacity .7s var(--ease),transform .7s var(--ease)}
  .animated-section.hidden{opacity:0;transform:translateY(16px)}

  /* domain rows (What I Do) */
  .domain-row{display:grid;grid-template-columns:180px 1fr;gap:30px;padding:32px 0;border-top:1px solid var(--border)}
  .domain-row:first-of-type{border-top:none;padding-top:4px}
  .domain-label-wrap{display:flex;align-items:flex-start;gap:9px}
  .domain-icon{flex-shrink:0;width:18px;height:18px;color:var(--amber-dim);margin-top:1px}
  .domain-icon svg{width:18px;height:18px;display:block}
  .domain-label{font-family:var(--font-mono);font-size:.73rem;letter-spacing:.06em;text-transform:uppercase;color:var(--amber-dim);line-height:1.5}
  .domain-text{color:var(--text-dim);font-size:1rem;line-height:1.8}

  .card-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:26px}
  .profile-card{border:1px solid var(--border);border-radius:12px;padding:22px;background:color-mix(in srgb, var(--border) 14%, transparent)}
  .card-kicker{font-family:var(--font-mono);font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:10px}
  .card-title{font-family:var(--font-display);font-size:1.05rem;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.35}
  .card-text{color:var(--text-dim);font-size:.94rem;line-height:1.7}


  /* experience: tabs + panel */
  .exp-layout{display:grid;grid-template-columns:230px 1fr;gap:36px}
  .exp-tabs{display:flex;flex-direction:column;gap:2px}
  .exp-tab{
    text-align:left;background:none;border:none;border-left:2px solid var(--border);
    padding:11px 16px;cursor:pointer;font-family:var(--font-mono);color:var(--text-mute);
    transition:color .18s var(--ease),border-color .18s var(--ease);
  }
  .exp-tab-company{display:block;font-size:.82rem;line-height:1.4}
  .exp-tab-role{display:block;font-size:.7rem;margin-top:3px;opacity:.75}
  .exp-tab:hover{color:var(--text)}
  .exp-tab.active{border-left-color:var(--amber);color:var(--text)}

  .exp-panel-title{font-size:1.3rem;font-weight:600;margin-bottom:4px}
  #exp-panel{transition:opacity .15s var(--ease)}
  .exp-panel-company{font-family:var(--font-mono);font-size:.86rem;color:var(--text-dim);margin-bottom:6px}
  .exp-panel-dates{font-family:var(--font-mono);font-size:.74rem;color:var(--text-mute);margin-bottom:22px}
  .exp-panel-duties li{position:relative;padding-left:18px;margin-bottom:10px;color:var(--text-dim);font-size:.95rem;line-height:1.65}
  .exp-panel-duties li::before{content:'–';position:absolute;left:0;color:var(--amber-dim)}

  /* education */
  .edu-row{padding:16px 0;border-top:1px solid var(--border)}
  .edu-row:first-child{border-top:none;padding-top:0}
  .edu-row strong{font-family:var(--font-display);font-weight:600;color:var(--text)}
  .edu-row span{color:var(--text-mute)}

  .connect-links{display:flex;flex-wrap:wrap;gap:12px;margin-top:22px}
  .connect-links a{
    display:inline-flex;align-items:center;gap:9px;
    border:1px solid var(--border-2);border-radius:999px;padding:11px 18px;
    font-family:var(--font-mono);font-size:.84rem;color:var(--text-dim);
    transition:border-color .2s var(--ease),color .2s var(--ease),transform .2s var(--ease);
  }
  .connect-links a:hover{border-color:var(--amber);color:var(--amber);transform:translateY(-1px)}
  .connect-links svg{width:16px;height:16px}

  footer{padding:20px 0 50px}
  .footer-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .footer-line{font-family:var(--font-mono);font-size:.72rem;color:var(--text-mute)}
  .notes-link{font-family:var(--font-mono);font-size:.72rem;color:var(--text-mute);border-bottom:1px solid var(--border-2);padding-bottom:1px;transition:color .2s var(--ease),border-color .2s var(--ease)}
  .notes-link:hover{color:var(--amber);border-color:var(--amber)}

  @media print{
    .corner-controls,.sidebar-nav,.sidebar-social{display:none !important}
    body{background:#fff;color:#000}
    .layout{grid-template-columns:1fr;padding:20px 0}
    .sidebar{position:static}
    .exp-layout{grid-template-columns:1fr}
  }

  @media (max-width:980px){
    .layout{grid-template-columns:1fr;gap:40px;padding:88px 0 40px}
    .sidebar{position:static;top:auto}
    .sidebar-nav{display:none}
    .domain-row{grid-template-columns:1fr;gap:10px}
    .exp-layout{grid-template-columns:1fr;gap:20px}
    .exp-tabs{flex-direction:row;overflow-x:auto;gap:8px;padding-bottom:4px;-webkit-overflow-scrolling:touch}
    .exp-tabs::-webkit-scrollbar{height:0}
    .exp-tab{border-left:none;border-bottom:2px solid var(--border);white-space:nowrap;flex-shrink:0}
    .exp-tab.active{border-left-color:transparent;border-bottom-color:var(--amber)}
    .exp-tab-role{display:none}
  }
  @media (max-width:640px){
    .wrap{padding:0 20px}
    .content-section{padding-bottom:64px}
    .card-grid{grid-template-columns:1fr}
  }
</style>
</head>

  <main class="content">

</div>

    shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3l7 3v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z"/></svg>',
    backup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/></svg>'
  };

  const els = {
    langText: document.getElementById('lang-text'),
    sidebarName: document.getElementById('sidebar-name'),
    sidebarRole: document.getElementById('sidebar-role'),
    sidebarBio: document.getElementById('sidebar-bio'),
    nav1: document.getElementById('nav-1'),
    nav2: document.getElementById('nav-2'),
    nav3: document.getElementById('nav-3'),
    nav4: document.getElementById('nav-4'),
    nav5: document.getElementById('nav-5'),
    nav6: document.getElementById('nav-6'),
    sidebarMeta: document.getElementById('sidebar-meta'),
    sidebarSocial: document.getElementById('sidebar-social'),
    widTitle: document.getElementById('wid-title'),
    domainRows: document.getElementById('domain-rows'),
    experienceTitle: document.getElementById('experience-title'),
    expTabs: document.getElementById('exp-tabs'),
    expPanel: document.getElementById('exp-panel'),
    educationTitle: document.getElementById('education-title'),
    eduList: document.getElementById('edu-list'),
    connectTitle: document.getElementById('connect-title'),
    connectLine: document.getElementById('connect-line'),
    connectLinks: document.getElementById('connect-links'),
    footerLine: document.getElementById('footer-line'),
  };

  let currentLang = 'tr';
  let activeExpIndex = 0;

  function renderExpPanel(lang, index){
    const d = content[lang];
    const exp = d.experienceItems[index];
    const dateStr = `${fmt(exp.start, lang)} – ${exp.end ? fmt(exp.end, lang) : d.present}`;
    els.expPanel.innerHTML = '';
    const title = document.createElement('div'); title.className='exp-panel-title'; title.textContent = exp.title;
    const company = document.createElement('div'); company.className='exp-panel-company'; company.textContent = exp.company;
    const dates = document.createElement('div'); dates.className='exp-panel-dates'; dates.textContent = dateStr;
    const ul = document.createElement('ul'); ul.className='exp-panel-duties';
    exp.duties.forEach(dt=>{ const li=document.createElement('li'); li.textContent=dt; ul.appendChild(li); });
    els.expPanel.append(title, company, dates, ul);
  }

  function renderExpTabs(lang){
    const d = content[lang];
    els.expTabs.innerHTML = '';
    d.experienceItems.forEach((exp, i)=>{
      const btn = document.createElement('button');
      btn.className = 'exp-tab' + (i === activeExpIndex ? ' active' : '');
      btn.setAttribute('role','tab');
      btn.setAttribute('aria-selected', i === activeExpIndex ? 'true':'false');
      const c = document.createElement('span'); c.className='exp-tab-company'; c.textContent = exp.company;
      const r = document.createElement('span'); r.className='exp-tab-role'; r.textContent = exp.title;
      btn.append(c, r);
      btn.addEventListener('click', ()=>{
        if(i === activeExpIndex) return;
        activeExpIndex = i;
        els.expTabs.querySelectorAll('.exp-tab').forEach((el,idx)=>{
          el.classList.toggle('active', idx===i);
          el.setAttribute('aria-selected', idx===i ? 'true':'false');
        });
        if(reduceMotion){
          renderExpPanel(currentLang, i);
        } else {
          els.expPanel.style.opacity = '0';
          setTimeout(()=>{ renderExpPanel(currentLang, i); els.expPanel.style.opacity = '1'; }, 130);
        }
      });
      els.expTabs.appendChild(btn);
    });
  }

  function makeSocialLink(label, href, iconKey){
    const a = document.createElement('a');
    a.href = href;
    a.setAttribute('aria-label', label);
    a.title = label;
    if(href.startsWith('http')){ a.target = '_blank'; a.rel = 'noopener noreferrer'; }
    a.innerHTML = ICONS[iconKey];
    return a;
  }

  function updateUI(lang){
    currentLang = lang;
    const d = content[lang];
    document.documentElement.lang = lang;

    els.langText.textContent = d.langBtn;
    els.sidebarName.textContent = d.sidebarName;
    els.sidebarRole.textContent = d.sidebarRole;
    els.sidebarBio.textContent = d.sidebarBio;
    els.nav1.textContent = d.navLabels[0];
    els.nav2.textContent = d.navLabels[1];
    els.nav3.textContent = d.topologyLinkText;
    els.nav4.textContent = d.notesLinkText;
    els.nav5.textContent = d.navLabels[2];
    els.nav6.textContent = d.navLabels[3];

    els.sidebarMeta.innerHTML = '';
    d.sidebarMeta.forEach(m=>{ const p=document.createElement('div'); p.textContent=m; els.sidebarMeta.appendChild(p); });

    els.sidebarSocial.innerHTML = '';
    d.socialLinks.forEach(s=> els.sidebarSocial.appendChild(makeSocialLink(s.label, s.href, s.icon)));

    els.widTitle.textContent = d.widTitle;
    els.domainRows.innerHTML = '';
    d.domains.forEach(dm=>{
      const row = document.createElement('div'); row.className = 'domain-row';
      const labelWrap = document.createElement('div'); labelWrap.className = 'domain-label-wrap';
      const icon = document.createElement('span'); icon.className = 'domain-icon'; icon.innerHTML = ICONS[dm.icon] || '';
      const label = document.createElement('div'); label.className = 'domain-label'; label.textContent = dm.label;
      labelWrap.append(icon, label);
      const text = document.createElement('div'); text.className = 'domain-text'; text.textContent = dm.text;
      row.append(labelWrap, text);
      els.domainRows.appendChild(row);
    });


    els.experienceTitle.textContent = d.experienceTitle;
    activeExpIndex = 0;
    renderExpTabs(lang);
    renderExpPanel(lang, activeExpIndex);


    els.educationTitle.textContent = d.educationTitle;
    els.eduList.innerHTML = '';
    d.education.forEach(e=>{
      const row = document.createElement('div'); row.className = 'edu-row';
      const strong = document.createElement('strong'); strong.textContent = e.degree;
      const span = document.createElement('span'); span.textContent = ' — ' + e.school;
      row.append(strong, span);
      els.eduList.appendChild(row);
    });

    els.connectTitle.textContent = d.connectTitle;
    els.connectLine.textContent = d.connectLine;
    els.connectLine.style.display = d.connectLine ? '' : 'none';
    els.connectLinks.innerHTML = '';
    d.socialLinks.forEach(s=>{
      const a = makeSocialLink(s.label, s.href, s.icon);
      const span = document.createElement('span'); span.textContent = s.label;
      a.appendChild(span);
      els.connectLinks.appendChild(a);
    });
    els.footerLine.textContent = d.footerLine;
  }

  const body = document.body;
  const langToggleBtn = document.getElementById('lang-toggle');
  const themeToggleBtn = document.getElementById('theme-toggle');
  const printBtn = document.getElementById('printBtn');
  const iconSun = document.getElementById('icon-sun');
  const iconMoon = document.getElementById('icon-moon');

  function toggleLanguage(){
    const next = currentLang === 'tr' ? 'en' : 'tr';
    localStorage.setItem('lang', next);
    updateUI(next);
  }
  function toggleTheme(){
    if(body.classList.contains('light-mode')){
      body.classList.remove('light-mode'); body.classList.add('dark-mode');
      iconSun.style.display='block'; iconMoon.style.display='none';
      localStorage.setItem('theme','dark-mode');
    } else {
      body.classList.remove('dark-mode'); body.classList.add('light-mode');
      iconSun.style.display='none'; iconMoon.style.display='block';
      localStorage.setItem('theme','light-mode');
    }
  }
  function handlePrint(){ try{ window.focus(); }catch(e){} window.print(); }

  /* ================= COMMAND PALETTE ================= */
  const CMDK_ICONS = {
    nav:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>',
    theme:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2"/></svg>',
    lang:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20z"/></svg>',
    mail:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 6-10 7L2 6"/></svg>',
    link:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>',
    doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
    print:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>'
  };

  function initCommandPalette(){
    const overlay = document.getElementById('cmdk-overlay');
    const input = document.getElementById('cmdk-input');
    const list = document.getElementById('cmdk-list');
    const toggleBtn = document.getElementById('cmdk-toggle');
    let selected = 0;
    let filtered = [];

    function buildCommands(){
      const d = content[currentLang];
      const cmds = [];
      d.navLabels.forEach((label, i)=>{
        const targets = ['what-i-do','experience','education','connect'];
        cmds.push({ label: (currentLang==='tr' ? 'Git: ' : 'Go to: ') + label, icon:'nav', tag:'↵', action:()=>{
          document.getElementById(targets[i]).scrollIntoView({behavior: reduceMotion ? 'auto' : 'smooth'});
        }});
      });
      cmds.push({ label: currentLang==='tr' ? 'Temayı değiştir' : 'Toggle theme', icon:'theme', tag:'', action: toggleTheme });
      cmds.push({ label: currentLang==='tr' ? 'Dili değiştir (EN)' : 'Switch language (TR)', icon:'lang', tag:'', action: toggleLanguage });
      cmds.push({ label: currentLang==='tr' ? 'E-postayı kopyala' : 'Copy email address', icon:'mail', tag:'parlarcoskun@gmail.com', action:()=>{
        navigator.clipboard && navigator.clipboard.writeText('parlarcoskun@gmail.com').catch(()=>{});
      }});
      cmds.push({ label:'LinkedIn', icon:'link', tag:'↗', action:()=>{ window.open('https://www.linkedin.com/in/coskun-parlar-411906137/', '_blank', 'noopener'); }});
      cmds.push({ label:'GitHub', icon:'link', tag:'↗', action:()=>{ window.open('https://github.com/coskunparlar', '_blank', 'noopener'); }});
      cmds.push({ label: currentLang==='tr' ? 'Topoloji' : 'Topology', icon:'doc', tag:'↗', action:()=>{ window.location.href = 'topology.html'; }});
      cmds.push({ label: currentLang==='tr' ? 'Teknik Notlar' : 'Technical Notes', icon:'doc', tag:'↗', action:()=>{ window.location.href = 'notes.html'; }});
      cmds.push({ label: currentLang==='tr' ? 'PDF olarak yazdır' : 'Print as PDF', icon:'print', tag:'⌘P', action: handlePrint });
      return cmds;
    }

    function render(query){
      const all = buildCommands();
      filtered = query
        ? all.filter(c => c.label.toLowerCase().includes(query.toLowerCase()))
        : all;
      selected = 0;
      list.innerHTML = '';
      if(!filtered.length){
        const empty = document.createElement('div'); empty.className = 'cmdk-empty';
        empty.textContent = currentLang==='tr' ? 'Sonuç bulunamadı' : 'No results';
        list.appendChild(empty);
        return;
      }
      filtered.forEach((cmd, i)=>{
        const item = document.createElement('div');
        item.className = 'cmdk-item' + (i===selected ? ' selected' : '');
        item.innerHTML = `<span class="cmdk-item-label"><span class="cmdk-item-icon">${CMDK_ICONS[cmd.icon]||''}</span>${cmd.label}</span><span class="cmdk-item-tag">${cmd.tag||''}</span>`;
        item.addEventListener('mouseenter', ()=>{ selected = i; updateSelection(); });
        item.addEventListener('click', ()=>{ cmd.action(); close(); });
        list.appendChild(item);
      });
    }

    function updateSelection(){
      Array.from(list.children).forEach((el,i)=> el.classList.toggle('selected', i===selected));
      const sel = list.children[selected];
      if(sel) sel.scrollIntoView({ block:'nearest' });
    }

    function open(){
      overlay.classList.add('open');
      input.value = '';
      render('');
      setTimeout(()=> input.focus(), 10);
    }
    function close(){
      overlay.classList.remove('open');
    }

    toggleBtn.addEventListener('click', open);
    overlay.addEventListener('click', (e)=>{ if(e.target === overlay) close(); });
    input.addEventListener('input', ()=> render(input.value));
    input.addEventListener('keydown', (e)=>{
      if(e.key === 'ArrowDown'){ e.preventDefault(); selected = Math.min(selected+1, filtered.length-1); updateSelection(); }
      else if(e.key === 'ArrowUp'){ e.preventDefault(); selected = Math.max(selected-1, 0); updateSelection(); }
      else if(e.key === 'Enter'){ e.preventDefault(); const cmd = filtered[selected]; if(cmd){ cmd.action(); close(); } }
      else if(e.key === 'Escape'){ close(); }
    });

    window.addEventListener('keydown', (e)=>{
      const isCmd = navigator.platform.toUpperCase().includes('MAC') ? e.metaKey : e.ctrlKey;
      if(isCmd && e.key.toLowerCase() === 'k'){ e.preventDefault(); overlay.classList.contains('open') ? close() : open(); }
      if(e.key === 'Escape' && overlay.classList.contains('open')) close();
    });
  }

  function initScrollSpy(){
    const navLinks = Array.from(document.querySelectorAll('.sidebar-nav a[data-target]'));
    if(!navLinks.length) return;
    const sections = navLinks.map(a => document.getElementById(a.dataset.target)).filter(Boolean);

    function setActive(id){
      navLinks.forEach(a=> a.classList.toggle('active', a.dataset.target === id));
    }

    // Clicking a nav link always activates it immediately — this must not
    // depend on scroll position or on the page being tall enough to scroll.
    let suppressSpyUntil = 0;
    navLinks.forEach(a=>{
      a.addEventListener('click', ()=>{
        setActive(a.dataset.target);
        suppressSpyUntil = Date.now() + 700; // ignore scroll-spy during the smooth-scroll animation
      });
    });

    const io = new IntersectionObserver((entries)=>{
      if(Date.now() < suppressSpyUntil) return;
      entries.forEach(entry=>{
        if(entry.isIntersecting) setActive(entry.target.id);
      });
    }, { rootMargin:'-15% 0px -55% 0px', threshold:0 });
    sections.forEach(s=> io.observe(s));

    // Fallback: near the bottom of the page, always activate the last section.
    window.addEventListener('scroll', ()=>{
      if(Date.now() < suppressSpyUntil) return;
      const scrolledToBottom = window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 4;
      if(scrolledToBottom) setActive(sections[sections.length - 1].id);
    }, { passive:true });
  }

  function init(){
    const storedLang = localStorage.getItem('lang') || 'tr';
    updateUI(storedLang);

    const storedTheme = localStorage.getItem('theme');
    if(storedTheme){
      body.classList.add(storedTheme);
      if(storedTheme === 'light-mode'){ iconSun.style.display='none'; iconMoon.style.display='block'; }
    } else {
      body.classList.add('dark-mode');
      localStorage.setItem('theme','dark-mode');
    }

    langToggleBtn.addEventListener('click', toggleLanguage);
    themeToggleBtn.addEventListener('click', toggleTheme);
    printBtn.addEventListener('click', handlePrint);
    initScrollSpy();
    initCommandPalette();

    const sections = document.querySelectorAll('.animated-section');
    if(reduceMotion){
      sections.forEach(s=> s.classList.remove('hidden'));
    } else {
      const io = new IntersectionObserver((ents,obs)=>{
        ents.forEach(en=>{ if(en.isIntersecting){ en.target.classList.remove('hidden'); obs.unobserve(en.target); } });
      }, { threshold:.08 });
      sections.forEach(s=>{ s.classList.add('hidden'); io.observe(s); });
    }
  }
  init();

  window.addEventListener('keydown', (e)=>{
    const isCmd = navigator.platform.toUpperCase().includes('MAC') ? e.metaKey : e.ctrlKey;
    if(isCmd && e.key.toLowerCase() === 'p'){ e.preventDefault(); handlePrint(); }
  });
});
</script>
</body>
