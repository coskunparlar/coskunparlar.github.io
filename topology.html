<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0a0c10; --panel:#11151c; --panel-2:#161b24;
    --text:#e9e6dd; --text-dim:#b8b4a9; --text-mute:#79828f;
    --border:#232936; --border-2:#2e3644;
    --amber:#f0a940; --amber-dim:#c8871f;
    --blue:#4da3ff; --green:#35c48f;
    --grid:rgba(233,230,221,.05);
    --font-display:'Inter',Arial,Helvetica,sans-serif;
    --font-body:'Inter',Arial,Helvetica,sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  body.light-mode{
    --ink:#f6f4ee; --panel:#ffffff; --panel-2:#f0ede5;
    --text:#1d222b; --text-dim:#4c5259; --text-mute:#676d74;
    --border:#ddd8cc; --border-2:#c9c3b4;
    --amber:#b97a13; --amber-dim:#9a660f;
    --blue:#1d6fd1; --green:#178a5f;
    --grid:rgba(29,34,43,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--ink);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.65;-webkit-font-smoothing:antialiased;transition:background .3s var(--ease),color .3s var(--ease)}
  a{color:inherit;text-decoration:none}

  .corner-controls{position:fixed;top:22px;right:22px;display:flex;gap:8px;z-index:60}
  .ctrl-btn{display:flex;align-items:center;gap:6px;background:color-mix(in srgb,var(--ink) 82%,transparent);backdrop-filter:blur(10px);border:1px solid var(--border-2);border-radius:8px;color:var(--text-dim);font-family:var(--font-mono);font-size:.7rem;padding:7px 10px;cursor:pointer;transition:color .2s,border-color .2s}
  .ctrl-btn:hover{color:var(--amber);border-color:var(--amber-dim)}
  .ctrl-btn svg{width:14px;height:14px;stroke:currentColor}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:4px}
  .progress{position:fixed;top:0;left:0;height:2px;width:0;background:linear-gradient(90deg,var(--amber),var(--amber-dim));z-index:200;transition:width .12s linear}

  .wrap{max-width:1220px;margin:0 auto;padding:0 28px}
  header.top{padding:96px 0 30px}
  .back-link{font-family:var(--font-mono);font-size:.72rem;color:var(--text-mute);transition:color .2s}
  .back-link:hover{color:var(--amber)}
  .kicker{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin:26px 0 10px}
  .kicker::after{content:'';height:1px;width:56px;background:var(--amber-dim);opacity:.5}
  h1{font-family:var(--font-display);font-weight:700;font-size:clamp(1.7rem,3.4vw,2.5rem);letter-spacing:-.02em}
  .lede{max-width:70ch;color:var(--text-dim);font-size:.95rem;margin-top:12px}

  /* ---------- diagram stage ---------- */
  .stage{margin-top:30px;border:1px solid var(--border);border-radius:14px;background:
      radial-gradient(var(--grid) 1px,transparent 1px) 0 0/22px 22px,
      linear-gradient(180deg,color-mix(in srgb,var(--panel) 88%,transparent),color-mix(in srgb,var(--ink) 92%,transparent));
    overflow:hidden}
  .stage-bar{display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border)}
  .stage-title{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute)}
  .stage-title b{color:var(--text);font-weight:600}
  .flow-toggles{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
  .flow-btn{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:.66rem;color:var(--text-dim);background:transparent;border:1px solid var(--border-2);border-radius:99px;padding:5px 11px;cursor:pointer;transition:all .2s var(--ease)}
  .flow-btn .dot{width:8px;height:8px;border-radius:50%}
  .flow-btn[data-flow="price"] .dot{background:var(--blue)}
  .flow-btn[data-flow="order"] .dot{background:var(--amber)}
  .flow-btn[data-flow="repl"]  .dot{background:var(--green)}
  .flow-btn[aria-pressed="false"]{opacity:.38}
  .flow-btn:hover{border-color:var(--amber-dim);color:var(--text)}

  .diagram-scroll{overflow-x:auto;padding:10px 6px 4px}
  .diagram-scroll svg{display:block;min-width:1040px;width:100%;height:auto}
  .scroll-hint{display:none;font-family:var(--font-mono);font-size:.62rem;color:var(--text-mute);text-align:center;padding:0 0 10px}
  @media (max-width:1080px){ .scroll-hint{display:block} }
  .caption{font-family:var(--font-mono);font-size:.66rem;color:var(--text-mute);padding:10px 18px 14px;border-top:1px solid var(--border)}

  /* ---- svg pieces ---- */
  svg text{font-family:var(--font-mono)}
  .zone{fill:color-mix(in srgb,var(--panel) 55%,transparent);stroke:var(--border-2);rx:12}
  .zone.ext{stroke-dasharray:5 5}
  .zone-title{fill:var(--text-mute);font-size:10.5px;letter-spacing:.18em;font-weight:600}
  .zone-tag{fill:var(--text-mute);font-size:9px;letter-spacing:.08em;opacity:.85}
  .node rect{fill:var(--panel);stroke:var(--border-2);transition:stroke .2s}
  .node:hover rect{stroke:var(--amber);filter:drop-shadow(0 0 6px color-mix(in srgb,var(--amber) 45%,transparent))}
  .node .t{fill:var(--text);font-family:var(--font-display);font-size:12.5px;font-weight:600}
  .node .s{fill:var(--text-mute);font-size:9px;letter-spacing:.05em}
  .node .ic{stroke:var(--amber);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .chip rect{fill:color-mix(in srgb,var(--panel-2) 80%,transparent);stroke:var(--border)}
  .link{stroke:var(--border-2);stroke-width:1.2;fill:none}
  .hosted{stroke:var(--amber-dim);stroke-width:1.3;fill:none;stroke-dasharray:1 5;stroke-linecap:round;opacity:.6}
  .foundation{fill:color-mix(in srgb,var(--amber) 6%,transparent);stroke:var(--amber-dim);stroke-width:1;opacity:.5}
  .found-label{fill:var(--amber);font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;opacity:.65}
  .flow{fill:none;stroke-width:1.8;stroke-linecap:round;stroke-dasharray:5 7}
  .flow-price{stroke:var(--blue);marker-end:url(#arr-price)}
  .flow-order{stroke:var(--amber);marker-end:url(#arr-order)}
  .flow-repl{stroke:var(--green);stroke-width:1.5;stroke-dasharray:3 7;marker-end:url(#arr-repl)}
  @keyframes dashmove{to{stroke-dashoffset:-24}}
  @keyframes dashmove-slow{to{stroke-dashoffset:-20}}
  .flow-price,.flow-order{animation:dashmove 1.1s linear infinite}
  .flow-repl{animation:dashmove-slow 2.4s linear infinite}
  .pulse{fill:var(--blue)}
  .pulse circle:last-child{animation:ping 2.2s var(--ease) infinite;transform-origin:center;fill:none;stroke:var(--blue)}
  @keyframes ping{0%{opacity:.8;stroke-width:2;r:3}100%{opacity:0;stroke-width:.5;r:9}}
  .hide-price .flow-price,.hide-price .pulse{display:none}
  .hide-order .flow-order{display:none}
  .hide-repl  .flow-repl{display:none}
  @media (prefers-reduced-motion: reduce){
    .flow-price,.flow-order,.flow-repl{animation:none}
    .pulse circle:last-child{animation:none;opacity:0}
    html{scroll-behavior:auto}
  }

  /* ---------- layers ---------- */
  section.block{padding:54px 0 8px}
  .block-head{display:flex;align-items:baseline;gap:14px;margin-bottom:6px}
  h2{font-family:var(--font-display);font-weight:700;font-size:1.25rem;letter-spacing:-.01em}
  .block-copy{max-width:74ch;color:var(--text-dim);font-size:.9rem;margin-bottom:24px}
  .layers{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
  .layer{border:1px solid var(--border);border-radius:14px;background:color-mix(in srgb,var(--panel) 72%,transparent);padding:0 18px 10px;position:relative;overflow:hidden;transition:border-color .25s var(--ease),transform .25s var(--ease)}
  .layer::before{content:'';position:absolute;inset:0 auto 0 0;width:3px;background:linear-gradient(180deg,var(--accent),transparent 85%)}
  .layer:hover{border-color:color-mix(in srgb,var(--accent) 55%,var(--border));transform:translateY(-2px)}
  .layer.tone-l1{--accent:#f0a940}
  .layer.tone-l2{--accent:#c98bff}
  .layer.tone-l3{--accent:#4da3ff}
  .layer.tone-l4{--accent:#2fd4c4}
  .layer.tone-l5{--accent:#4bd07f}
  body.light-mode .layer.tone-l1{--accent:#b97a13}
  body.light-mode .layer.tone-l2{--accent:#7d3fc4}
  body.light-mode .layer.tone-l3{--accent:#1d6fd1}
  body.light-mode .layer.tone-l4{--accent:#0f8a80}
  body.light-mode .layer.tone-l5{--accent:#178a4e}
  .layer-head{display:flex;align-items:center;gap:9px;padding:16px 0 0}
  .layer-ico{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:7px;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 32%,transparent);background:color-mix(in srgb,var(--accent) 8%,transparent);transition:background .2s var(--ease),transform .2s var(--ease)}
  .layer-ico svg{width:15px;height:15px}
  .layer:hover .layer-ico{background:color-mix(in srgb,var(--accent) 16%,transparent);transform:scale(1.06)}
  .layer-idx{font-family:var(--font-mono);font-size:.66rem;font-weight:600;color:var(--accent);letter-spacing:.1em;padding:2px 7px;border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:6px;background:color-mix(in srgb,var(--accent) 8%,transparent)}
  .layer-zone{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-mute)}
  .layer h3{font-family:var(--font-display);font-size:1.02rem;font-weight:600;letter-spacing:-.01em;margin:11px 0 12px}
  .lnode{display:grid;grid-template-columns:14px 1fr;gap:10px;padding:10px 0;border-top:1px dashed var(--border)}
  .lnode-dot{width:6px;height:6px;border-radius:50%;margin-top:6px;background:var(--accent);opacity:.55;transition:opacity .2s var(--ease)}
  .layer:hover .lnode-dot{opacity:.9}
  .lnode b{display:block;font-family:var(--font-mono);font-size:.73rem;font-weight:600;color:var(--text);letter-spacing:.02em}
  .lnode span{display:block;font-size:.8rem;color:var(--text-mute);margin-top:3px;line-height:1.5}

  /* ---------- sequence ---------- */
  .seq{margin-top:10px;position:relative;max-width:720px}
  .phase-label{display:flex;align-items:center;gap:9px;margin:22px 0 10px;font-family:var(--font-mono);font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;color:var(--amber)}
  .phase-label:first-child{margin-top:0}
  .phase-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 4px color-mix(in srgb,var(--amber) 16%,transparent)}
  .phase-txt::after{content:'';display:inline-block;vertical-align:middle;margin-left:10px;width:38px;height:1px;background:linear-gradient(90deg,var(--amber-dim),transparent);opacity:.5}
  .step{position:relative;display:grid;grid-template-columns:26px 40px 1fr;align-items:start;padding:9px 0;margin-left:3px}
  .step-rail{position:relative;display:flex;justify-content:center;align-self:stretch}
  .step-rail::before{content:'';position:absolute;top:-9px;bottom:-9px;width:1.5px;background:var(--border-2)}
  .step:last-child .step-rail::before{bottom:auto;height:22px}
  .step-node{position:relative;z-index:1;width:9px;height:9px;border-radius:50%;margin-top:5px;background:var(--panel);border:1.5px solid var(--border-2);transition:all .2s var(--ease)}
  .step:hover .step-node{border-color:var(--amber);background:var(--amber);box-shadow:0 0 0 4px color-mix(in srgb,var(--amber) 18%,transparent)}
  .step-num{font-family:var(--font-mono);font-size:.7rem;color:var(--text-mute);padding-top:4px;transition:color .2s var(--ease)}
  .step:hover .step-num{color:var(--amber)}
  .step-body{padding-bottom:2px}
  .step-body b{display:block;font-family:var(--font-display);font-size:.9rem;font-weight:600;letter-spacing:-.01em}
  .step-body span{display:block;font-size:.8rem;color:var(--text-mute);line-height:1.55;margin-top:2px}

  footer{padding:50px 0 34px}
  .footer-line{font-family:var(--font-mono);font-size:.66rem;color:var(--text-mute)}

  @media print{
    .corner-controls,.back-link,.flow-toggles,.scroll-hint,.progress{display:none !important}
    body.dark-mode,body.light-mode{--ink:#fff;--panel:#fff;--panel-2:#fff;--text:#000;--text-dim:#333;--text-mute:#555;--border:#bbb;--border-2:#999;--amber:#8a5500;--amber-dim:#8a5500;--blue:#1d4f8f;--green:#1e6e4e;--grid:transparent}
    body{background:#fff !important;color:#000 !important}
    .flow-price,.flow-order,.flow-repl{animation:none}
    .stage{break-inside:avoid}
  }
</style>
</head>

<script>
/* Tema, ilk boyamadan önce uygulanır (açılış flaşını önler; kayıt yoksa sistem tercihi kullanılır). */
(function(){
  var t = null;
  try { t = localStorage.getItem('theme'); } catch (e) {}
  if (t !== 'light-mode' && t !== 'dark-mode') {
    t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light-mode' : 'dark-mode';
  }
  document.body.className = t;
})();

<div class="progress" id="progress" aria-hidden="true"></div>

<div class="corner-controls">
  <button id="theme-toggle" class="ctrl-btn" title="Temayı değiştir">
    <svg id="icon-sun" aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg id="icon-moon" aria-hidden="true" focusable="false" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
  </button>
  <button id="lang-toggle" class="ctrl-btn" title="Dili değiştir / Switch language"><span id="lang-text">EN</span></button>
</div>

<div class="wrap">
  <header class="top">
    <a class="back-link" id="back-link" href="index.html">← CV'ye dön</a>
    <div class="kicker" id="kicker">Referans Mimari</div>
    <h1 id="page-title">Altyapı Topolojisi</h1>
    <p class="lede" id="page-lede"></p>
  </header>

  <!-- ==================== TOPOLOGY STAGE ==================== -->
  <div class="stage">
    <div class="stage-bar">
      <div class="stage-title"><b id="stage-title">Trading Platform Akışı</b> <span id="stage-sub">· logical view</span></div>
      <div class="flow-toggles" id="flow-toggles" role="group" aria-label="Akış katmanları">
        <button class="flow-btn" data-flow="price" aria-pressed="true"><span class="dot"></span><span class="fl" id="fl-price">Fiyat Akışı</span></button>
        <button class="flow-btn" data-flow="order" aria-pressed="true"><span class="dot"></span><span class="fl" id="fl-order">Emir Akışı</span></button>
        <button class="flow-btn" data-flow="repl" aria-pressed="true"><span class="dot"></span><span class="fl" id="fl-repl">Replikasyon</span></button>
      </div>
    </div>

    const lang = document.documentElement.lang === 'en' ? 'en' : 'tr';
    d.layers.forEach((ly, i) => {
      const meta = LAYER_META[i] || { tone:'core', zonesTr:'', zonesEn:'' };
      const card = document.createElement('div');
      card.className = 'layer tone-' + meta.tone;
      const head = document.createElement('div');
      head.className = 'layer-head';
      const ic = document.createElement('span'); ic.className = 'layer-ico';
      ic.innerHTML = '<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">' + (LAYER_ICONS[meta.icon] || '') + '</svg>';
      const idx = document.createElement('span'); idx.className = 'layer-idx'; idx.textContent = 'L' + (i + 1);
      const zone = document.createElement('span'); zone.className = 'layer-zone';
      zone.textContent = lang === 'en' ? meta.zonesEn : meta.zonesTr;
      head.append(ic, idx, zone);
      const h3 = document.createElement('h3'); h3.textContent = ly.title;
      card.append(head, h3);
      ly.nodes.forEach(([b, s]) => {
        const nd = document.createElement('div');
        nd.className = 'lnode';
        const dot = document.createElement('span'); dot.className = 'lnode-dot';
        const wrapTxt = document.createElement('div');
        const bb = document.createElement('b'); bb.textContent = b;
        const ss = document.createElement('span'); ss.textContent = s;
        wrapTxt.append(bb, ss);
        nd.append(dot, wrapTxt);
        card.appendChild(nd);
      });
      wrap.appendChild(card);
    });
  }
  function renderSeq(d){
    const wrap = $('seq');
    wrap.innerHTML = '';
    let lastPhase = null;
    d.sequence.forEach(([b, s, phase], i) => {
      if (phase && phase !== lastPhase){
        const ph = document.createElement('div');
        ph.className = 'phase-label';
        ph.innerHTML = '<span class="phase-dot"></span>';
        const pt = document.createElement('span'); pt.className = 'phase-txt'; pt.textContent = phase;
        ph.appendChild(pt);
        wrap.appendChild(ph);
        lastPhase = phase;
      }
      const el = document.createElement('div');
      el.className = 'step';
      const rail = document.createElement('div'); rail.className = 'step-rail';
      rail.innerHTML = '<span class="step-node"></span>';
      const num = document.createElement('span'); num.className = 'step-num'; num.textContent = String(i + 1).padStart(2, '0');
      const tx = document.createElement('div'); tx.className = 'step-body';
      const bb = document.createElement('b'); bb.textContent = b;
      const ss = document.createElement('span'); ss.textContent = s;
      tx.append(bb, ss);
      el.append(rail, num, tx);
      wrap.appendChild(el);
    });
  }

  function updateUI(lang){
    const d = content[lang];
    document.documentElement.lang = lang;
    langToggleBtn.setAttribute('aria-label', d.uiLangSwitch); langToggleBtn.title = d.uiLangSwitch;
    themeToggleBtn.setAttribute('aria-label', d.uiTheme);     themeToggleBtn.title = d.uiTheme;
    $('lang-text').textContent = d.langBtn;
    $('back-link').textContent = d.backLink;
    $('kicker').textContent = d.kicker;
    $('page-title').textContent = d.title;
    $('page-lede').textContent = d.lede;
    $('stage-title').textContent = d.stageTitle;
    $('stage-sub').textContent = d.stageSub;
    $('stage-caption').textContent = d.stageCaption;
    $('fl-price').textContent = d.flPrice;
    $('fl-order').textContent = d.flOrder;
    $('fl-repl').textContent = d.flRepl;
    $('flow-toggles').setAttribute('aria-label', d.flowGroup);
    $('scroll-hint').textContent = d.scrollHint;
    const fig = $('topology-figure');
    if (fig) fig.setAttribute('aria-label', d.uiDiagram);
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const k = el.getAttribute('data-i18n');
      if (d[k]) el.textContent = d[k];
    });
    $('layers-title').textContent = d.layersTitle;
    $('layers-copy').textContent = d.layersCopy;
    $('seq-title').textContent = d.sequenceLabel;
    $('seq-copy').textContent = d.sequenceCopy;
    renderLayers(d);
    renderSeq(d);
    $('footer-line').textContent = '© ' + new Date().getFullYear() + ' Coşkun Parlar';
  }

  function setTheme(theme){
    body.classList.remove('dark-mode', 'light-mode');
    body.classList.add(theme);
    const isLight = theme === 'light-mode';
    iconSun.style.display = isLight ? 'none' : 'block';
    iconMoon.style.display = isLight ? 'block' : 'none';
  }

  langToggleBtn.addEventListener('click', () => {
    const next = document.documentElement.lang === 'tr' ? 'en' : 'tr';
    storage.set('lang', next);
    updateUI(next);
  });
  themeToggleBtn.addEventListener('click', () => {
    const next = body.classList.contains('light-mode') ? 'dark-mode' : 'light-mode';
    storage.set('theme', next);
    setTheme(next);
  });

  /* akış katmanı anahtarları */
  const diagramWrap = $('diagram-wrap');
  document.querySelectorAll('.flow-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.flow;
      const off = btn.getAttribute('aria-pressed') === 'true';
      btn.setAttribute('aria-pressed', off ? 'false' : 'true');
      diagramWrap.classList.toggle('hide-' + f, off);
    });
  });

  const storedLang = storage.get('lang') || 'tr';
  updateUI(storedLang);
  setTheme(body.classList.contains('light-mode') ? 'light-mode' : 'dark-mode');

  (function(){ var pr=document.getElementById('progress'); if(!pr) return; function os(){ var el=document.documentElement; var mx=el.scrollHeight-el.clientHeight; var p=mx>0?Math.min(1,Math.max(0,(window.scrollY||el.scrollTop)/mx)):0; pr.style.width=(p*100).toFixed(2)+'%'; } window.addEventListener('scroll',os,{passive:true}); window.addEventListener('resize',os); os(); })();
});
</script>
</body>
</html>
