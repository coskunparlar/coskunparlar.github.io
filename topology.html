<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Coşkun Parlar — Trading Infrastructure Topology" />
<title>Altyapı Topolojisi — Coşkun Parlar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0a0c10;
    --border:#232a35;
    --border-2:#2c3441;
    --panel:#10141b;
    --panel-2:#141923;
    --text:#e9e6dd;
    --text-dim:#a7aeb9;
    --text-mute:#6d7684;
    --amber:#f0a940;
    --amber-dim:#c98a34;
    --green:#82c991;
    --blue:#7aa2f7;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'IBM Plex Sans',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --container:1120px;
    --ease:cubic-bezier(.22,.7,.2,1);
  }
  body.light-mode{
    --ink:#f6f4ee;
    --border:#ddd8cb;
    --border-2:#c9c3b3;
    --panel:#fffaf0;
    --panel-2:#f0eadf;
    --text:#16181c;
    --text-dim:#4c5259;
    --text-mute:#7c8189;
    --amber:#b3690f;
    --amber-dim:#8f5309;
    --green:#3a7c4d;
    --blue:#315fbd;
  }
  *,*::before,*::after{box-sizing:border-box}
  @media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.001ms !important;transition-duration:.001ms !important;scroll-behavior:auto !important}}
  html,body{margin:0;padding:0}
  body{background:var(--ink);color:var(--text);font-family:var(--font-body);-webkit-font-smoothing:antialiased;transition:background .35s var(--ease),color .35s var(--ease)}
  a{color:inherit;text-decoration:none}
  h1,h2,h3,p{margin:0}
  h1,h2,h3{font-family:var(--font-display);letter-spacing:-.01em}
  .wrap{max-width:var(--container);margin:0 auto;padding:0 28px}
  ::selection{background:var(--amber);color:var(--ink)}
  :focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:2px}

  .corner-controls{position:fixed;top:18px;right:18px;z-index:100;display:flex;gap:6px;background:color-mix(in srgb,var(--ink) 70%,transparent);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:999px;padding:5px}
  .ctrl-btn{background:transparent;border:none;color:var(--text-dim);font-family:var(--font-mono);font-size:.7rem;letter-spacing:.05em;width:34px;height:34px;border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:color .2s var(--ease),background .2s var(--ease)}
  .ctrl-btn:hover{color:var(--amber);background:var(--border)}
  #lang-toggle{width:auto;padding:0 12px}
  .ctrl-btn svg{width:15px;height:15px}

  header.top{padding:90px 0 42px}
  .back-link{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:.78rem;color:var(--text-mute);margin-bottom:28px;transition:color .2s var(--ease)}
  .back-link:hover{color:var(--amber)}
  .kicker{font-family:var(--font-mono);font-size:.76rem;letter-spacing:.1em;text-transform:uppercase;color:var(--amber-dim);margin-bottom:16px}
  .title{font-size:clamp(2rem,4.4vw,3rem);font-weight:700;line-height:1.08}

  main{padding-bottom:96px}
  .section{border-top:1px solid var(--border);padding:38px 0}
  .section-head{display:grid;grid-template-columns:220px 1fr;gap:34px;margin-bottom:26px;align-items:start}
  .section-label{font-family:var(--font-mono);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:var(--amber-dim);line-height:1.6}
  .section-copy{color:var(--text-dim);font-size:1rem;line-height:1.75;max-width:78ch}

  .topology{position:relative;border:1px solid var(--border-2);border-radius:18px;background:linear-gradient(180deg,color-mix(in srgb,var(--panel) 92%,transparent),color-mix(in srgb,var(--ink) 96%,transparent));padding:24px;overflow:hidden}
  .topology::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 15% 0%,color-mix(in srgb,var(--amber) 12%,transparent),transparent 28%),radial-gradient(circle at 85% 15%,color-mix(in srgb,var(--blue) 9%,transparent),transparent 30%);pointer-events:none}
  .flow{position:relative;display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;z-index:1}
  .layer{min-height:100%;background:color-mix(in srgb,var(--panel-2) 84%,transparent);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative}
  .layer:not(:last-child)::after{content:'→';position:absolute;right:-14px;top:50%;transform:translateY(-50%);font-family:var(--font-mono);font-size:1.05rem;color:var(--amber-dim);z-index:2}
  .layer-num{font-family:var(--font-mono);font-size:.68rem;color:var(--text-mute);margin-bottom:8px}
  .layer-title{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--text)}
  .node{border:1px solid var(--border-2);border-radius:10px;padding:10px 11px;margin-top:9px;background:color-mix(in srgb,var(--ink) 28%,transparent)}
  .node strong{display:block;font-family:var(--font-mono);font-size:.74rem;font-weight:600;color:var(--text);line-height:1.4}
  .node span{display:block;font-size:.82rem;line-height:1.5;color:var(--text-dim);margin-top:4px}


  .sequence{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
  .step{border:1px solid var(--border);border-radius:12px;padding:14px;background:var(--panel);min-height:108px}
  .step-num{font-family:var(--font-mono);font-size:.68rem;color:var(--text-mute);margin-bottom:8px}
  .step-title{font-family:var(--font-display);font-size:.95rem;font-weight:600;margin-bottom:7px}
  .step-text{font-size:.84rem;line-height:1.55;color:var(--text-dim)}

  footer{padding:30px 0 50px;border-top:1px solid var(--border)}
  .footer-line{font-family:var(--font-mono);font-size:.72rem;color:var(--text-mute)}

  @media (max-width:1080px){.flow{grid-template-columns:1fr}.layer:not(:last-child)::after{content:'↓';right:50%;top:auto;bottom:-17px;transform:translateX(50%)}}
  @media (max-width:720px){.wrap{padding:0 20px}header.top{padding:78px 0 34px}.section-head{grid-template-columns:1fr;gap:10px}.topology{padding:16px}.sequence{grid-template-columns:1fr}.corner-controls{top:12px;right:12px}}
</style>
</head>
<body class="dark-mode">

<div class="corner-controls">
  <button id="lang-toggle" class="ctrl-btn" title="Dili değiştir / Switch language"><span id="lang-text">EN</span></button>
  <button id="theme-toggle" class="ctrl-btn" title="Tema değiştir">
    <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<div class="wrap">
  <header class="top">
    <a href="index.html" class="back-link" id="back-link">← CV'ye dön</a>
    <div class="kicker" id="kicker"></div>
    <h1 class="title" id="page-title"></h1>
  </header>
</div>

<main class="wrap">
  <section class="section">
    <div class="section-head">
      <div class="section-label" id="architecture-label"></div>
      <p class="section-copy" id="architecture-copy"></p>
    </div>
    <div class="topology" aria-label="Trading infrastructure topology">
      <div class="flow" id="flow"></div>
    </div>
  </section>


  <section class="section">
    <div class="section-head">
      <div class="section-label" id="sequence-label"></div>
      <p class="section-copy" id="sequence-copy"></p>
    </div>
    <div class="sequence" id="sequence-grid"></div>
  </section>
</main>

<footer>
  <div class="wrap footer-line" id="footer-line"></div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const content = {
    tr: {
      langBtn:'EN',
      backLink:"← CV'ye dön",
      kicker:'Referans Mimari',
      title:'Altyapı Topolojisi',
      architectureLabel:'Trading Platform Akışı',
      architectureCopy:'Fiziksel altyapıdan LP bağlantılarına kadar platform katmanlarını gösteren referans trading mimarisi.',
      layers:[
        {title:'Client & Edge', nodes:[
          ['Client Terminal','Desktop, mobile ve web erişim kanalları.'],
          ['Public DNS / TLS','Erişim, sertifika ve domain sürekliliği.'],
          ['Firewall / Edge','NAT, ACL, VPN ve erişim kısıtları.']
        ]},
        {title:'Access Layer', nodes:[
          ['MT5 Access Server','Client bağlantılarını platform core katmanından ayrıştırır.'],
          ['Network Segmentation','Production ve management trafiği ayrı VLAN/port group yapısında tutulur.'],
          ['Rate / Session Control','Oturum, bağlantı ve servis erişimi kontrollü izlenir.']
        ]},
        {title:'MT5 Core', nodes:[
          ['Trade Server','Emir iletimi, hesap, grup ve risk parametrelerinin merkezi.'],
          ['History Server','Tick, chart ve geçmiş veri sürekliliği.'],
          ['Manager / Admin','Yetki matrisi, sembol, grup ve operasyonel kontrol.']
        ]},
        {title:'Bridge & Liquidity', nodes:[
          ['Bridge / FIX','Sembol mapping, markup, routing ve execution katmanı.'],
          ['Aggregation / Priority','LP fiyatlarının aggregation veya priority/fallback mantığıyla yönetimi.'],
          ['Liquidity Providers','Latency, rejection/fill ve stale quote davranışı izlenir.']
        ]},
        {title:'DR & Continuity', nodes:[
          ['Backup / DR Site','Replika, failover, failback ve runbook süreçleri.'],
          ['Platform Monitoring','Servis durumu, kaynak kullanımı, fiyat akışı ve log takibi.'],
          ['Backup Repository','Immutable/rotasyonlu yedek, restore testi ve kapasite kontrolü.']
        ]}
      ],
      sequenceLabel:'Kurulum ve Doğrulama Akışı',
      sequenceCopy:'Yeni bir trading platformu canlıya alınırken sıra önemlidir; altyapı, platform core, ürün/sembol yapısı, LP bağlantısı ve emir testleri ayrı ayrı doğrulanmadan production geçişi yapılmaz.',
      sequence:[
        ['Host','RAID, firmware, iDRAC/iLO ve fiziksel kaynak doğrulaması.'],
        ['Storage','LUN/datastore, multipath, latency ve kapasite kontrolü.'],
        ['Virtualization','ESXi, vCenter, cluster, HA/DRS ve port group standardı.'],
        ['VM Baseline','CPU/RAM/disk, OS hardening, NTP, DNS ve servis dizinleri.'],
        ['MT5 Core','Trade, history, access, backup ve manager servislerinin kurulumu.'],
        ['Products / Symbols','Sembol, session, digit, contract size, margin ve grup parametrelerinin hazırlanması.'],
        ['Bridge / LP','FIX bağlantısı, sembol mapping, aggregation, priority ve LP fiyat akışının bağlanması.'],
        ['Pricing Validation','Bid/ask, spread, markup, DOM, stale price ve fiyat sürekliliği testleri.'],
        ['Trade / Order Tests','Market, pending, SL/TP, margin, stop-out, execution ve log doğrulaması.'],
        ['Go-Live','Production erişimlerinin açılması, son fiyat/emir kontrolü ve canlı geçiş.']
      ],
      footer:'Coşkun Parlar — İstanbul'
    },
    en: {
      langBtn:'TR',
      backLink:'← Back to CV',
      kicker:'Reference Architecture',
      title:'Infrastructure Topology',
      architectureLabel:'Trading Platform Flow',
      architectureCopy:'A reference trading architecture showing the platform layers from physical infrastructure to LP connectivity.',
      layers:[
        {title:'Client & Edge', nodes:[
          ['Client Terminal','Desktop, mobile, and web access channels.'],
          ['Public DNS / TLS','Access, certificate, and domain continuity.'],
          ['Firewall / Edge','NAT, ACL, VPN, and access restrictions.']
        ]},
        {title:'Access Layer', nodes:[
          ['MT5 Access Server','Separates client connections from the platform core.'],
          ['Network Segmentation','Production and management traffic stay on separate VLANs / port groups.'],
          ['Rate / Session Control','Sessions, connections, and service access are monitored under control.']
        ]},
        {title:'MT5 Core', nodes:[
          ['Trade Server','The center for orders, accounts, groups, and risk parameters.'],
          ['History Server','Tick, chart, and historical data continuity.'],
          ['Manager / Admin','Permission matrix, symbols, groups, and operational control.']
        ]},
        {title:'Bridge & Liquidity', nodes:[
          ['Bridge / FIX','Symbol mapping, markup, routing, and execution layer.'],
          ['Aggregation / Priority','LP pricing managed through aggregation or priority/fallback logic.'],
          ['Liquidity Providers','Latency, rejection/fill, and stale-quote behavior are monitored.']
        ]},
        {title:'DR & Continuity', nodes:[
          ['Backup / DR Site','Replica, failover, failback, and runbook processes.'],
          ['Platform Monitoring','Service state, resource usage, price flow, and log monitoring.'],
          ['Backup Repository','Immutable/rotated backup, restore testing, and capacity control.']
        ]}
      ],
      sequenceLabel:'Installation and Validation Flow',
      sequenceCopy:'Sequence matters when bringing a new trading platform live; infrastructure, platform core, products/symbols, LP connectivity, and order tests are validated separately before production cutover.',
      sequence:[
        ['Host','RAID, firmware, iDRAC/iLO, and physical resource validation.'],
        ['Storage','LUN/datastore, multipath, latency, and capacity control.'],
        ['Virtualization','ESXi, vCenter, cluster, HA/DRS, and port-group standard.'],
        ['VM Baseline','CPU/RAM/disk, OS hardening, NTP, DNS, and service directories.'],
        ['MT5 Core','Trade, history, access, backup, and manager service deployment.'],
        ['Products / Symbols','Symbol, session, digit, contract size, margin, and group parameter preparation.'],
        ['Bridge / LP','FIX connection, symbol mapping, aggregation, priority, and LP price-feed connection.'],
        ['Pricing Validation','Bid/ask, spread, markup, DOM, stale-price, and price-continuity testing.'],
        ['Trade / Order Tests','Market, pending, SL/TP, margin, stop-out, execution, and log validation.'],
        ['Go-Live','Production access enablement, final price/order validation, and live cutover.']
      ],
      footer:'Coskun Parlar — Istanbul'
    }
  };

  const els = {
    langText:document.getElementById('lang-text'),
    backLink:document.getElementById('back-link'),
    kicker:document.getElementById('kicker'),
    title:document.getElementById('page-title'),
    architectureLabel:document.getElementById('architecture-label'),
    architectureCopy:document.getElementById('architecture-copy'),
    flow:document.getElementById('flow'),
    sequenceLabel:document.getElementById('sequence-label'),
    sequenceCopy:document.getElementById('sequence-copy'),
    sequenceGrid:document.getElementById('sequence-grid'),
    footer:document.getElementById('footer-line')
  };

  function updateUI(lang){
    const d = content[lang];
    document.documentElement.lang = lang;
    els.langText.textContent = d.langBtn;
    els.backLink.textContent = d.backLink;
    els.kicker.textContent = d.kicker;
    els.title.textContent = d.title;
    els.architectureLabel.textContent = d.architectureLabel;
    els.architectureCopy.textContent = d.architectureCopy;
    els.sequenceLabel.textContent = d.sequenceLabel;
    els.sequenceCopy.textContent = d.sequenceCopy;
    els.footer.textContent = d.footer;

    els.flow.innerHTML = '';
    d.layers.forEach((layer, index) => {
      const col = document.createElement('div');
      col.className = 'layer';
      const num = document.createElement('div');
      num.className = 'layer-num';
      num.textContent = String(index + 1).padStart(2, '0');
      const title = document.createElement('h2');
      title.className = 'layer-title';
      title.textContent = layer.title;
      col.append(num, title);
      layer.nodes.forEach(([name, desc]) => {
        const node = document.createElement('div');
        node.className = 'node';
        const strong = document.createElement('strong');
        strong.textContent = name;
        const span = document.createElement('span');
        span.textContent = desc;
        node.append(strong, span);
        col.appendChild(node);
      });
      els.flow.appendChild(col);
    });

    els.sequenceGrid.innerHTML = '';
    d.sequence.forEach(([title, text], index) => {
      const step = document.createElement('article');
      step.className = 'step';
      const num = document.createElement('div');
      num.className = 'step-num';
      num.textContent = String(index + 1).padStart(2, '0');
      const h3 = document.createElement('div');
      h3.className = 'step-title';
      h3.textContent = title;
      const p = document.createElement('div');
      p.className = 'step-text';
      p.textContent = text;
      step.append(num, h3, p);
      els.sequenceGrid.appendChild(step);
    });
  }

  const body = document.body;
  const langToggleBtn = document.getElementById('lang-toggle');
  const themeToggleBtn = document.getElementById('theme-toggle');
  const iconSun = document.getElementById('icon-sun');
  const iconMoon = document.getElementById('icon-moon');

  function setTheme(theme){
    body.classList.remove('dark-mode', 'light-mode');
    body.classList.add(theme);
    const isLight = theme === 'light-mode';
    iconSun.style.display = isLight ? 'none' : 'block';
    iconMoon.style.display = isLight ? 'block' : 'none';
  }

  langToggleBtn.addEventListener('click', () => {
    const next = document.documentElement.lang === 'tr' ? 'en' : 'tr';
    localStorage.setItem('lang', next);
    updateUI(next);
  });

  themeToggleBtn.addEventListener('click', () => {
    const next = body.classList.contains('light-mode') ? 'dark-mode' : 'light-mode';
    localStorage.setItem('theme', next);
    setTheme(next);
  });

  const storedLang = localStorage.getItem('lang') || 'tr';
  const storedTheme = localStorage.getItem('theme') || 'dark-mode';
  updateUI(storedLang);
  setTheme(storedTheme);
});
</script>
</body>
</html>
